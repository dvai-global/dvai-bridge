name: react-native-quickstart
description: Hello-world flow on the React Native TurboModule example (examples/react-native-app/, RN 0.85 Bridgeless) with backend selector.
output: docs/marketing/assets/react-native-quickstart.mp4
fps: 30
scenes:
  - duration: 5
    caption: "Launch the RN app in iOS Simulator (Bridgeless ON, TurboModule registered)."
  - duration: 6
    caption: "Tap a backend in the selector — iOS-only options shown; Android-only options dimmed."
  - duration: 7
    caption: "Tap 'Start' — DVAIBridge.start({ backend, modelPath }); progress hook updates."
  - duration: 12
    caption: "Type a prompt; openai-node streams chunks from native llama.cpp into the JS side."
  - duration: 5
    caption: "Closing card: '@dvai-bridge/react-native — TurboModule, RN 0.77+, native streaming HTTP'."
