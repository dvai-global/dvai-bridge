name: ios-foundation-example
description: examples/ios-foundation — SwiftUI app, Apple Foundation Models backend (iOS 26+).
output: docs/marketing/assets/ios-foundation-example.mp4
fps: 30
scenes:
  - duration: 5
    caption: "Open examples/ios-foundation in Xcode; SwiftUI app links DVAIBridge + MacPaw OpenAI."
  - duration: 6
    caption: "Pick an `iPhone 16 (iOS 26.0)` simulator destination; build + run."
