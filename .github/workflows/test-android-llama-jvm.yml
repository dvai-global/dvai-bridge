name: Android JVM — llama (core + capacitor wrapper) + 16 KB alignment

on:
  pull_request:
    paths:
      - 'packages/dvai-bridge-android-llama-core/**'
      - 'packages/dvai-bridge-android-shared-core/**'
      - 'packages/dvai-bridge-capacitor-llama/android/**'
      - 'packages/dvai-bridge-capacitor/src/**'
      - 'fixtures/**'
      - '.github/workflows/test-android-llama-jvm.yml'
  # Release-tag-only push trigger.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: android-llama-jvm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-jvm-test:
    name: android-llama-core JVM + 16 KB alignment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/dvai-bridge-android-llama-core/android
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-llama-core-${{ hashFiles('packages/dvai-bridge-android-shared-core/android/**/*.gradle*', 'packages/dvai-bridge-android-llama-core/android/**/*.gradle*', 'packages/dvai-bridge-android-llama-core/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-llama-core-

      - name: Publish android-shared-core to mavenLocal
        # Phase 3D: llama-core's `api 'co.deepvoiceai:android-shared-core:2.0.0'`
        # dep resolves through mavenLocal at build time. Workflow has to seed
        # mavenLocal before running llama-core tests.
        working-directory: packages/dvai-bridge-android-shared-core/android
        run: ./gradlew publishToMavenLocal --no-daemon --stacktrace

      - name: Run JVM unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Build release .so for alignment check
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify 16 KB page-size alignment on produced .so
        run: |
          set -e
          missing_alignment=0
          for so in $(find build -name '*.so'); do
            # objdump's "align 2**N" line under LOAD segments — N=14 means 16 KB
            line=$(objdump -p "$so" | awk '/LOAD/ {print; exit}')
            if [ -z "$line" ]; then
              echo "::warning::no LOAD segment found for $so — skipping"
              continue
            fi
            n=$(echo "$line" | sed -n 's/.*align 2\*\*\([0-9]\+\).*/\1/p')
            if [ -z "$n" ]; then
              echo "::warning::could not parse alignment for $so — skipping"
              continue
            fi
            page_size=$((1 << n))
            if [ "$page_size" -lt 16384 ]; then
              echo "::error::$so has page alignment $page_size bytes, expected >= 16384"
              missing_alignment=1
            else
              echo "$so: page alignment = $page_size bytes — OK"
            fi
          done
          exit $missing_alignment

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-llama-core-reports
          path: packages/dvai-bridge-android-llama-core/android/build/reports/
          retention-days: 14
          if-no-files-found: ignore

  wrapper-jvm-test:
    name: capacitor-llama wrapper JVM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: core-jvm-test
    defaults:
      run:
        working-directory: packages/dvai-bridge-capacitor-llama/android
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-llama-wrapper-${{ hashFiles('packages/dvai-bridge-android-shared-core/android/**/*.gradle*', 'packages/dvai-bridge-android-llama-core/android/**/*.gradle*', 'packages/dvai-bridge-capacitor-llama/android/**/*.gradle*', 'packages/dvai-bridge-capacitor-llama/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-llama-wrapper-

      - name: Publish shared-core + llama-core to mavenLocal
        # The Capacitor wrapper depends on llama-core, which depends on
        # shared-core. Both have to be in mavenLocal before the wrapper
        # tests can resolve their classpaths.
        run: |
          (cd packages/dvai-bridge-android-shared-core/android && ./gradlew publishToMavenLocal --no-daemon --stacktrace)
          (cd packages/dvai-bridge-android-llama-core/android && ./gradlew publishToMavenLocal --no-daemon --stacktrace)
        working-directory: ${{ github.workspace }}

      - name: Run wrapper sanity tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: capacitor-llama-wrapper-reports
          path: packages/dvai-bridge-capacitor-llama/android/build/reports/
          retention-days: 14
          if-no-files-found: ignore
