name: Android JVM — capacitor-mediapipe

on:
  pull_request:
    paths:
      - 'packages/dvai-bridge-capacitor-mediapipe/android/**'
      - 'packages/dvai-bridge-capacitor/src/**'
      - 'fixtures/**'
      - '.github/workflows/test-android-mediapipe-jvm.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/dvai-bridge-capacitor-mediapipe/android/**'
      - 'packages/dvai-bridge-capacitor/src/**'
      - 'fixtures/**'

concurrency:
  group: android-mediapipe-jvm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/dvai-bridge-capacitor-mediapipe/android
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-mediapipe-${{ hashFiles('packages/dvai-bridge-capacitor-mediapipe/android/**/*.gradle*', 'packages/dvai-bridge-capacitor-mediapipe/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-mediapipe-

      - name: Gradle test
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-mediapipe-reports
          path: packages/dvai-bridge-capacitor-mediapipe/android/build/reports/
          retention-days: 7
