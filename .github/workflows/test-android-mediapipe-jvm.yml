name: Android JVM — mediapipe (core + capacitor wrapper)

on:
  pull_request:
    paths:
      - 'packages/dvai-bridge-android-mediapipe-core/**'
      - 'packages/dvai-bridge-android-shared-core/**'
      - 'packages/dvai-bridge-capacitor-mediapipe/android/**'
      - 'packages/dvai-bridge-capacitor/src/**'
      - 'fixtures/**'
      - '.github/workflows/test-android-mediapipe-jvm.yml'
  # Release-tag-only push trigger.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: android-mediapipe-jvm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-jvm-test:
    name: android-mediapipe-core JVM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/dvai-bridge-android-mediapipe-core/android
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-mediapipe-core-${{ hashFiles('packages/dvai-bridge-android-shared-core/android/**/*.gradle*', 'packages/dvai-bridge-android-mediapipe-core/android/**/*.gradle*', 'packages/dvai-bridge-android-mediapipe-core/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-mediapipe-core-

      - name: Publish android-shared-core to mavenLocal
        # Phase 3D: mediapipe-core's `api 'co.deepvoiceai:android-shared-core:2.0.0'`
        # dep needs mavenLocal to resolve.
        working-directory: packages/dvai-bridge-android-shared-core/android
        run: ./gradlew publishToMavenLocal --no-daemon --stacktrace

      - run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-mediapipe-core-reports
          path: packages/dvai-bridge-android-mediapipe-core/android/build/reports/
          retention-days: 14
          if-no-files-found: ignore

  wrapper-jvm-test:
    name: capacitor-mediapipe wrapper JVM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: core-jvm-test
    defaults:
      run:
        working-directory: packages/dvai-bridge-capacitor-mediapipe/android
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-mediapipe-wrapper-${{ hashFiles('packages/dvai-bridge-android-shared-core/android/**/*.gradle*', 'packages/dvai-bridge-android-mediapipe-core/android/**/*.gradle*', 'packages/dvai-bridge-capacitor-mediapipe/android/**/*.gradle*', 'packages/dvai-bridge-capacitor-mediapipe/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-mediapipe-wrapper-

      - name: Publish shared-core + mediapipe-core to mavenLocal
        working-directory: ${{ github.workspace }}
        run: |
          (cd packages/dvai-bridge-android-shared-core/android && ./gradlew publishToMavenLocal --no-daemon --stacktrace)
          (cd packages/dvai-bridge-android-mediapipe-core/android && ./gradlew publishToMavenLocal --no-daemon --stacktrace)

      - run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: capacitor-mediapipe-wrapper-reports
          path: packages/dvai-bridge-capacitor-mediapipe/android/build/reports/
          retention-days: 14
          if-no-files-found: ignore
