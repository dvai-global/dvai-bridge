name: .NET — DVAIBridge NuGet family

on:
  pull_request:
    paths:
      - 'packages/dvai-bridge-dotnet/**'
      - '.github/workflows/test-dotnet.yml'
  # Release-tag-only push trigger. Routine `git push origin main`
  # does NOT fire CI; use a PR for pre-merge validation or
  # workflow_dispatch for an ad-hoc run.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
  # Tag pushes drive the publish-to-NuGet.org step (gated by tag prefix).
  release:
    types: [published]

concurrency:
  group: dotnet-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_VERSION: '10.0.x'

jobs:
  # ------------------------------------------------------------------
  # Ubuntu: facade tests + Desktop slice + ONNX Runtime slice + ML.NET
  # slice build & test. Every csproj that compiles to bare net10.0 (no
  # platform suffix) lands here. Android moved to its own job; iOS +
  # Catalyst run on macOS only.
  # ------------------------------------------------------------------
  facade-and-net-backends:
    name: Facade + Desktop/ONNX/MLNet (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-ubuntu-${{ hashFiles('packages/dvai-bridge-dotnet/Directory.Packages.props') }}
          restore-keys: |
            nuget-ubuntu-

      - name: Restore facade + slices
        working-directory: packages/dvai-bridge-dotnet
        run: |
          dotnet restore src/DVAIBridge/DVAIBridge.csproj -p:TargetFrameworks=net10.0
          dotnet restore src/DVAIBridge.Desktop/DVAIBridge.Desktop.csproj
          dotnet restore src/DVAIBridge.OnnxRuntime/DVAIBridge.OnnxRuntime.csproj
          dotnet restore src/DVAIBridge.MLNet/DVAIBridge.MLNet.csproj

      - name: Build facade (net10.0)
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet build src/DVAIBridge/DVAIBridge.csproj -c Release -f net10.0 --no-restore

      - name: Build Desktop slice
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet build src/DVAIBridge.Desktop/DVAIBridge.Desktop.csproj -c Release --no-restore

      - name: Build ONNX Runtime slice
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet build src/DVAIBridge.OnnxRuntime/DVAIBridge.OnnxRuntime.csproj -c Release --no-restore

      - name: Build ML.NET slice
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet build src/DVAIBridge.MLNet/DVAIBridge.MLNet.csproj -c Release --no-restore

      - name: Build + run facade tests
        working-directory: packages/dvai-bridge-dotnet
        run: |
          dotnet build tests/DVAIBridge.Tests/DVAIBridge.Tests.csproj -c Release
          dotnet test tests/DVAIBridge.Tests/DVAIBridge.Tests.csproj -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=test-results-facade.trx"

      - name: Build + run Desktop tests
        working-directory: packages/dvai-bridge-dotnet
        run: |
          dotnet build tests/DVAIBridge.Desktop.Tests/DVAIBridge.Desktop.Tests.csproj -c Release
          dotnet test tests/DVAIBridge.Desktop.Tests/DVAIBridge.Desktop.Tests.csproj -c Release --no-build \
            --logger "trx;LogFileName=test-results-desktop.trx"

      - name: Build + run ONNX tests
        working-directory: packages/dvai-bridge-dotnet
        run: |
          dotnet build tests/DVAIBridge.OnnxRuntime.Tests/DVAIBridge.OnnxRuntime.Tests.csproj -c Release
          dotnet test tests/DVAIBridge.OnnxRuntime.Tests/DVAIBridge.OnnxRuntime.Tests.csproj -c Release --no-build \
            --logger "trx;LogFileName=test-results-onnx.trx"

      - name: Build + run ML.NET tests
        working-directory: packages/dvai-bridge-dotnet
        run: |
          dotnet build tests/DVAIBridge.MLNet.Tests/DVAIBridge.MLNet.Tests.csproj -c Release
          dotnet test tests/DVAIBridge.MLNet.Tests/DVAIBridge.MLNet.Tests.csproj -c Release --no-build \
            --logger "trx;LogFileName=test-results-mlnet.trx"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ubuntu
          path: packages/dvai-bridge-dotnet/tests/**/TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore

  # ------------------------------------------------------------------
  # Windows: full desktop run on the host that ships the win-x64 / win-arm64
  # native llama.cpp binaries. Repeats the Desktop / ONNX / ML.NET tests on
  # the actual Windows toolchain so we catch P/Invoke / runtime resolver
  # drift before consumers do.
  # ------------------------------------------------------------------
  windows-desktop:
    name: Desktop + ONNX + MLNet (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: nuget-windows-${{ hashFiles('packages/dvai-bridge-dotnet/Directory.Packages.props') }}
          restore-keys: |
            nuget-windows-

      - name: Restore + build slices
        working-directory: packages/dvai-bridge-dotnet
        shell: pwsh
        run: |
          dotnet restore src/DVAIBridge.Desktop/DVAIBridge.Desktop.csproj
          dotnet restore src/DVAIBridge.OnnxRuntime/DVAIBridge.OnnxRuntime.csproj
          dotnet restore src/DVAIBridge.MLNet/DVAIBridge.MLNet.csproj
          dotnet build src/DVAIBridge.Desktop/DVAIBridge.Desktop.csproj -c Release --no-restore
          dotnet build src/DVAIBridge.OnnxRuntime/DVAIBridge.OnnxRuntime.csproj -c Release --no-restore
          dotnet build src/DVAIBridge.MLNet/DVAIBridge.MLNet.csproj -c Release --no-restore

      - name: Build + run desktop tests
        working-directory: packages/dvai-bridge-dotnet
        shell: pwsh
        run: |
          dotnet test tests/DVAIBridge.Desktop.Tests/DVAIBridge.Desktop.Tests.csproj -c Release `
            --logger "trx;LogFileName=test-results-desktop-win.trx"
          dotnet test tests/DVAIBridge.OnnxRuntime.Tests/DVAIBridge.OnnxRuntime.Tests.csproj -c Release `
            --logger "trx;LogFileName=test-results-onnx-win.trx"
          dotnet test tests/DVAIBridge.MLNet.Tests/DVAIBridge.MLNet.Tests.csproj -c Release `
            --logger "trx;LogFileName=test-results-mlnet-win.trx"

  # ------------------------------------------------------------------
  # Android binding compile-only check on Ubuntu (no instrumentation —
  # we only verify Metadata.xml + class-parse produce a clean C# wrapper).
  # ------------------------------------------------------------------
  android-binding:
    name: Android binding compile (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-android-${{ hashFiles('packages/dvai-bridge-dotnet/Directory.Packages.props') }}
          restore-keys: |
            nuget-android-

      - name: Fetch DVAI Bridge AAR + shared-core AAR + kotlin-coroutines reference jar
        # The binding needs three native artifacts:
        #   1. dvai-bridge-$(Version).aar          — the AAR we bind (Bind=true).
        #   2. android-shared-core-$(Version).aar  — class-parse reference for
        #      CorsConfig + OffloadConfig, which appear in StartOptions' 22-arg
        #      constructor. Without this the 22-arg ctor is silently dropped
        #      and StartOptions becomes uneditable from C#.
        #   3. kotlin-coroutines-min.jar           — class-parse reference for
        #      kotlin.coroutines.Continuation so the AAR's `suspend fun`
        #      methods bind as Continuation-form (we wrap them in Task<T>
        #      via TaskContinuation<T> in AndroidNativeBridge.cs). Trimmed
        #      from upstream kotlin-stdlib-2.3.21.jar so we only pull the
        #      ~10 classes class-parse needs — avoids polluting the
        #      generated C# surface with 600+ kotlin internals.
        run: |
          mkdir -p packages/dvai-bridge-dotnet/src/DVAIBridge.Android/native
          curl -L \
            "https://repo1.maven.org/maven2/co/deepvoiceai/dvai-bridge/4.0.0/dvai-bridge-4.0.0.aar" \
            -o packages/dvai-bridge-dotnet/src/DVAIBridge.Android/native/dvai-bridge-4.0.0.aar
          curl -L \
            "https://repo1.maven.org/maven2/co/deepvoiceai/android-shared-core/4.0.0/android-shared-core-4.0.0.aar" \
            -o packages/dvai-bridge-dotnet/src/DVAIBridge.Android/native/android-shared-core-4.0.0.aar
          curl -L \
            "https://repo1.maven.org/maven2/org/jetbrains/kotlin/kotlin-stdlib/2.3.21/kotlin-stdlib-2.3.21.jar" \
            -o /tmp/kotlin-stdlib-2.3.21.jar
          mkdir -p /tmp/k && cd /tmp/k
          unzip -q -o /tmp/kotlin-stdlib-2.3.21.jar \
            'kotlin/coroutines/Continuation.class' \
            'kotlin/coroutines/CoroutineContext.class' \
            'kotlin/coroutines/CoroutineContext$*.class' \
            'kotlin/coroutines/EmptyCoroutineContext.class' \
            'kotlin/Result.class' \
            'kotlin/Result$*.class' \
            'kotlin/jvm/functions/Function1.class' \
            'kotlin/jvm/functions/Function2.class' \
            'kotlin/Unit.class'
          jar cf /tmp/kotlin-coroutines-min.jar kotlin
          cd -
          cp /tmp/kotlin-coroutines-min.jar packages/dvai-bridge-dotnet/src/DVAIBridge.Android/native/kotlin-coroutines-min.jar

      - name: Restore Android binding
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet restore src/DVAIBridge.Android/DVAIBridge.Android.csproj

      - name: Build Android binding (with bindings-generated active)
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet build src/DVAIBridge.Android/DVAIBridge.Android.csproj -c Release --no-restore -p:BindingsGenerated=true

  # ------------------------------------------------------------------
  # macOS: builds the Swift xcframework + the iOS + Catalyst binding csproj
  # + the Desktop slice (osx-arm64 Metal-enabled native llama bundle).
  # Also handles full-solution pack + tag-gated NuGet.org push for all six
  # NuGet IDs.
  # ------------------------------------------------------------------
  ios-catalyst-and-pack:
    name: iOS + Catalyst + xcframework + pack (macOS)
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      # The llama.cpp git submodule is needed for the
      # mac-side-prepare-xcframework.sh step below — it builds the llama +
      # mtmd xcframeworks from llama.cpp source. Only this job uses them;
      # the other jobs (Ubuntu, Windows) deliberately skip submodules to
      # keep their checkouts fast.
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install ios + maccatalyst + android workloads
        run: dotnet workload install ios maccatalyst android

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-macos-${{ hashFiles('packages/dvai-bridge-dotnet/Directory.Packages.props') }}
          restore-keys: |
            nuget-macos-

      - name: Prepare llama + mtmd xcframeworks (for the iOS umbrella SwiftPM resolve)
        # The DVAIBridge.iOS native umbrella's Package.swift declares
        # binaryTarget entries pointing at
        # packages/dvai-bridge-android-llama-core/.../build-apple/{llama,mtmd}.xcframework
        # — built fresh from the llama.cpp submodule by this script.
        # Required before build-xcframework.sh (next step), which packages
        # the DVAIBridge.xcframework that links against them.
        run: bash scripts/mac-side-prepare-xcframework.sh

      - name: Build xcframework (iOS + Catalyst slices)
        working-directory: packages/dvai-bridge-dotnet/src/DVAIBridge.iOS/native
        run: bash build-xcframework.sh

      - name: Prepare osx-arm64 llama.cpp binary
        run: bash scripts/mac-side-prepare-llama-desktop.sh
        continue-on-error: true

      - name: Fetch DVAI Bridge AAR + shared-core AAR + kotlin-coroutines reference jar
        # Same artifact set as the android-binding job — see that job for
        # the rationale on each curl + jar build step.
        run: |
          mkdir -p packages/dvai-bridge-dotnet/src/DVAIBridge.Android/native
          curl -L \
            "https://repo1.maven.org/maven2/co/deepvoiceai/dvai-bridge/4.0.0/dvai-bridge-4.0.0.aar" \
            -o packages/dvai-bridge-dotnet/src/DVAIBridge.Android/native/dvai-bridge-4.0.0.aar
          curl -L \
            "https://repo1.maven.org/maven2/co/deepvoiceai/android-shared-core/4.0.0/android-shared-core-4.0.0.aar" \
            -o packages/dvai-bridge-dotnet/src/DVAIBridge.Android/native/android-shared-core-4.0.0.aar
          curl -L \
            "https://repo1.maven.org/maven2/org/jetbrains/kotlin/kotlin-stdlib/2.3.21/kotlin-stdlib-2.3.21.jar" \
            -o /tmp/kotlin-stdlib-2.3.21.jar
          mkdir -p /tmp/k && cd /tmp/k
          unzip -q -o /tmp/kotlin-stdlib-2.3.21.jar \
            'kotlin/coroutines/Continuation.class' \
            'kotlin/coroutines/CoroutineContext.class' \
            'kotlin/coroutines/CoroutineContext$*.class' \
            'kotlin/coroutines/EmptyCoroutineContext.class' \
            'kotlin/Result.class' \
            'kotlin/Result$*.class' \
            'kotlin/jvm/functions/Function1.class' \
            'kotlin/jvm/functions/Function2.class' \
            'kotlin/Unit.class'
          jar cf /tmp/kotlin-coroutines-min.jar kotlin
          cd -
          cp /tmp/kotlin-coroutines-min.jar packages/dvai-bridge-dotnet/src/DVAIBridge.Android/native/kotlin-coroutines-min.jar

      - name: Restore solution
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet restore DVAIBridge.sln

      - name: Build iOS + Catalyst binding (multi-target)
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet build src/DVAIBridge.iOS/DVAIBridge.iOS.csproj -c Release --no-restore

      - name: Build Desktop slice (osx-arm64)
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet build src/DVAIBridge.Desktop/DVAIBridge.Desktop.csproj -c Release --no-restore

      - name: Build all packages (with bindings-generated active)
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet build DVAIBridge.sln -c Release --no-restore -p:BindingsGenerated=true

      - name: Pack all six NuGets
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        working-directory: packages/dvai-bridge-dotnet
        run: dotnet pack DVAIBridge.sln -c Release -o ./out --no-build -p:BindingsGenerated=true

      - name: Upload .nupkg artifacts
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: |
            packages/dvai-bridge-dotnet/out/*.nupkg
            packages/dvai-bridge-dotnet/out/*.snupkg

      # Tag-gated NuGet.org push for all six packages. The wildcard picks
      # up DVAIBridge / .iOS / .Android / .Desktop / .OnnxRuntime / .MLNet
      # in one push; --skip-duplicate makes re-runs safe.
      - name: Push to NuGet.org
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release') && env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        working-directory: packages/dvai-bridge-dotnet
        run: |
          dotnet nuget push ./out/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${NUGET_API_KEY}" \
            --skip-duplicate
