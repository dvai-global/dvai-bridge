name: Publish Packages

# CD pipeline for the SDK packages. Each platform's packages publish
# to that platform's canonical public registry — NOT to GitHub
# Packages. The Hub desktop app has its own separate workflow
# (`dvai-hub-release.yml`) that attaches signed installers to a
# GitHub Release; this file is exclusively for the language-bindings.
#
# Trigger model (matches transformers.js / llama.cpp posture):
#   - release: types: [published] — fires when the maintainer clicks
#     "Publish release" in the GitHub UI for a vN.N.N tag.
#   - push: tags v*.*.* — covers tag-first flows where the tag is
#     cut from the CLI before notes are added.
#   - workflow_dispatch — break-glass for republishes / dry runs.
#
# Concurrency: keyed on github.ref so a release-published + tag-push
# pair for the same version queues rather than runs in parallel. The
# registries all reject duplicate-version publishes (npm 403, etc.),
# so the second invocation will fail-fast and is harmless.
#
# ── Active legs ──
#   npm  — publishes the @dvai-bridge/* JS scopes to npmjs.org.
#          Requires repo secret NPM_TOKEN (automation token, npmjs
#          → Access Tokens → "Automation"). The job is gated on
#          secret presence so dry runs / forks don't fail.
#
# ── Planned legs (commented out until pipeline-ready) ──
#   Maven Central — co.deepvoiceai:dvai-bridge*. Requires Sonatype
#                   OSSRH credentials + GPG signing key.
#   NuGet.org     — DVAIBridge.* C# packages. Requires NUGET_API_KEY.
#   CocoaPods Trunk — DVAIBridge.podspec etc. Requires
#                     COCOAPODS_TRUNK_TOKEN.
#   pub.dev       — dvai_bridge Flutter package. Requires service
#                   account JSON in PUB_CREDENTIALS_JSON.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish @dvai-bridge/* to npmjs.org
    runs-on: ubuntu-latest
    # Skip when NPM_TOKEN isn't configured (e.g. pre-pipeline
    # setup, forks, dispatch dry-runs). The actual publish step
    # will surface a clearer error if the token is wrong, so we
    # don't try to validate it here.
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js (npmjs.org registry)
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@dvai-bridge'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (only @dvai-bridge/* JS-publishable packages)
        # pnpm-workspace.yaml includes packages/*, examples/*, docs, hub —
        # we only want to build the publish-to-npm subset:
        #
        #   * Build:   @dvai-bridge/* npm packages that have a working
        #              Node-only `build` script (tsup / bob / etc.)
        #
        #   * Skip the workspace siblings:
        #     - examples/* — example apps (web-react, etc.) whose vite/rolldown
        #       builds aren't needed for publishing and routinely break on
        #       fresh node_modules (rolldown 1.0.0-rc.15 vite-resolve flake).
        #     - docs — VitePress site; built by deploy-docs.yml separately.
        #     - hub — Tauri desktop app; built by dvai-hub-release.yml.
        #
        #   * Skip these @dvai-bridge/* packages with platform-toolchain builds:
        #     - @dvai-bridge/flutter — needs Flutter + Dart SDKs
        #     - @dvai-bridge/dotnet  — needs `android` .NET workload (NETSDK1147)
        #     - @dvai-bridge/ios     — needs Xcode + SwiftPM
        #
        # `--filter='./packages/**'` scopes pnpm's recursion to packages/*
        # only; the remaining `!...` filters exclude the three
        # platform-toolchain consumers.
        run: pnpm --filter='./packages/**' --filter='!@dvai-bridge/flutter' --filter='!@dvai-bridge/dotnet' --filter='!@dvai-bridge/ios' run build

      - name: Publish to npmjs.org
        # `pnpm -r publish` walks every workspace package and skips
        # any with `"private": true`. The `--access public` flag is
        # required for first-time publishes under a scope; subsequent
        # publishes ignore it. `--no-git-checks` is needed because
        # the tag/release event leaves HEAD in detached state.
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-maven:
    name: Publish co.deepvoiceai:* to Maven Central
    runs-on: macos-latest
    # vanniktech maven-publish 0.33 has a Windows-only `file://` URI
    # parse bug; macos-latest is unaffected. Gated on the
    # MAVEN_CENTRAL_ENABLED repo variable so dry-runs / forks don't
    # accidentally trip it.
    if: ${{ vars.MAVEN_CENTRAL_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Import GPG key + configure pinentry-loopback (for signing.useGpgCmd)
        # vanniktech-maven-publish (any version) delegates signing to
        # Gradle's built-in `signing` plugin, which in 9.4.1 uses a
        # BouncyCastle version that can't parse GnuPG 2.4+ keys that
        # have `pref-aead-algos` (subpkt 34) in their user-ID self-sig.
        # We diagnosed this from a `gpg --list-packets` dump of the
        # actual key: protection is fine (iter+salt S2K, AES128/SHA1)
        # but the AEAD-pref subpacket trips BC's parser.
        #
        # The fix: bypass BC entirely by importing the key into the
        # runner's GnuPG keyring (which we proved can parse it via the
        # --import probe in earlier debug runs) and switching Gradle's
        # signing plugin to `useGpgCmd()` mode, which shells out to
        # `gpg` for actual signature generation. The build.gradle in
        # each of the 5 Android modules has `signing { useGpgCmd() }`
        # added for this.
        env:
          KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          PASS: ${{ secrets.MAVEN_SIGNING_KEY_PASSWORD }}
        run: |
          set -e
          # Configure gpg-agent for unattended use — allow-loopback-pinentry
          # lets us pass the passphrase via stdin/env, no GUI prompt.
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          cat > ~/.gnupg/gpg-agent.conf <<EOF
          allow-loopback-pinentry
          EOF
          cat > ~/.gnupg/gpg.conf <<EOF
          pinentry-mode loopback
          EOF
          # Restart agent to pick up the new config.
          gpgconf --kill gpg-agent || true
          # Import the secret key. --batch + --yes for non-interactive.
          printf '%s' "$KEY" | gpg --batch --yes --import 2>&1 | head -5
          # Trust the imported key ultimately so signing doesn't prompt.
          gpg --import-ownertrust <<< "${{ secrets.MAVEN_SIGNING_KEY_ID }}:6:" 2>&1 | head -3
          # Smoke-test: sign one byte to verify gpg can decrypt the
          # secret key with this passphrase. If this fails, we know
          # the workflow's gpg can't sign — no point running Gradle.
          echo "x" | gpg --batch --pinentry-mode loopback --yes \
              --passphrase "$PASS" \
              --local-user "${{ secrets.MAVEN_SIGNING_KEY_ID }}" \
              --output /dev/null --sign - \
              && echo "✓ gpg signing smoke test passed" \
              || (echo "✗ gpg signing smoke test FAILED — passphrase or key mismatch"; exit 1)

      - name: Debug PGP secret shape (no secret-value exposure)
        # Temporary debug step — left in place during v4.0.1 prep until we
        # confirm the Maven signing pipeline is stable, then removed in a
        # follow-up. Prints ONLY metadata about the secret (length, format
        # indicators) — never the value itself. The `head -c 8 | base64`
        # trick prints the first 8 bytes of the secret in a form GitHub
        # Actions doesn't recognise as the secret string (so it doesn't
        # auto-mask the diagnostic output).
        env:
          KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          KEYID: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
          PASS: ${{ secrets.MAVEN_SIGNING_KEY_PASSWORD }}
        run: |
          echo "=== MAVEN_SIGNING_KEY ==="
          echo "  length: ${#KEY} bytes"
          echo "  line count: $(printf '%s' "$KEY" | wc -l)"
          echo "  first 8 bytes (base64 to avoid GHA masking): $(printf '%s' "$KEY" | head -c 8 | base64)"
          echo "  last 8 bytes (base64): $(printf '%s' "$KEY" | tail -c 8 | base64)"
          echo "  contains 'BEGIN PGP': $(printf '%s' "$KEY" | grep -c 'BEGIN PGP' || true)"
          echo "  contains 'END PGP':   $(printf '%s' "$KEY" | grep -c 'END PGP' || true)"
          echo "  looks like base64 (printable+/=): $(printf '%s' "$KEY" | grep -qE '^[A-Za-z0-9+/=]+$' && echo yes || echo no)"
          # CRLF detection — Git Bash on Windows often produces CRLF
          # in multi-line output, which BouncyCastle's armor parser
          # can't tolerate. Counts \r bytes in the secret.
          CR_COUNT=$(printf '%s' "$KEY" | tr -cd '\r' | wc -c | tr -d ' ')
          LF_COUNT=$(printf '%s' "$KEY" | tr -cd '\n' | wc -c | tr -d ' ')
          echo "  \\r (CR) count: $CR_COUNT"
          echo "  \\n (LF) count: $LF_COUNT"
          if [ "$CR_COUNT" -gt 0 ]; then
            echo "  ⚠ secret contains $CR_COUNT CR bytes — this almost certainly breaks the armor parser"
          fi

          # Independent verification — try importing the key with gpg
          # itself. If gpg accepts it, the armor is structurally fine
          # and any subsequent failure is in vanniktech/BouncyCastle.
          # If gpg rejects it too, we have a clearer error message.
          echo
          echo "=== gpg --import probe ==="
          printf '%s' "$KEY" > /tmp/key-probe.asc
          gpg --import --batch --no-tty /tmp/key-probe.asc 2>&1 | head -10 || echo "(gpg --import exited non-zero)"
          echo
          echo "=== gpg --list-secret-keys after import ==="
          gpg --list-secret-keys --keyid-format=long 2>&1 | head -10
          rm -f /tmp/key-probe.asc
          echo
          echo "=== MAVEN_SIGNING_KEY_ID ==="
          echo "  length: ${#KEYID} chars"
          echo "  base64 of value: $(printf '%s' "$KEYID" | base64)"
          echo
          echo "=== MAVEN_SIGNING_KEY_PASSWORD ==="
          echo "  length: ${#PASS} chars"
          echo "  (value not printed even base64'd — too short to safely diagnose without exposing)"

      - name: Decode signing key + run publishAndReleaseToMavenCentral for all 5 modules
        # The signing key MUST be a single-line base64 encoding of the
        # binary GPG secret key (NOT the ASCII-armored .asc form, NOT
        # raw ASCII armor pasted as multi-line). vanniktech 0.33's
        # `signingInMemoryKey` parser fails with "Could not read PGP
        # secret key" if the secret contains anything else (we hit this
        # on the first v4.0.1 fire — run 26361328491).
        # Generate with:
        #   gpg --export-secret-keys "$KEYID" | base64 -w0 | \
        #     gh secret set MAVEN_SIGNING_KEY -R dvai-global/dvai-bridge
        # The mavenCentral* Sonatype Portal token is the
        # username:password pair from https://central.sonatype.com/account.
        #
        # Each Android core publishes independently — they live in
        # separate Gradle roots (one Gradle build per package; the
        # monorepo isn't a single multi-project root). Order is
        # shared-core first (the others depend on it), then the four
        # consumers in any order. The `publishAndReleaseToMavenCentral`
        # task auto-promotes the staging repo once Sonatype validation
        # passes; no manual click on the Portal afterwards.
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          # In-memory env vars kept ONLY so signAllPublications() in the
          # module build.gradle still triggers. The actual signing path
          # is gpg-cmd (see useGpgCmd() override in each module) — these
          # env vars are read but unused at sign-time.
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_KEY_PASSWORD }}
          # Switches the build.gradle's signing { useGpgCmd() } override on.
          ORG_GRADLE_PROJECT_USE_GPG_CMD_SIGNING: 'true'
          # Passphrase + key-name for `signing.gnupg.passphrase` and
          # `signing.gnupg.keyName` — Gradle's useGpgCmd() reads these
          # to feed gpg --passphrase-fd. Setting via env (with dotted
          # property name) is unreliable across shells, so we also
          # write ~/.gradle/gradle.properties below as belt-and-suspenders.
          MAVEN_SIGNING_KEY_ID: ${{ secrets.MAVEN_SIGNING_KEY_ID }}
          MAVEN_SIGNING_KEY_PASSWORD: ${{ secrets.MAVEN_SIGNING_KEY_PASSWORD }}
        run: |
          set -e
          # Write Gradle properties file for useGpgCmd signing inputs.
          # signing.gnupg.keyName picks the right key in the runner's
          # keyring (already imported by the previous step); signing.
          # gnupg.passphrase feeds it to gpg via --passphrase-fd 0.
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties <<EOF
          signing.gnupg.keyName=${MAVEN_SIGNING_KEY_ID}
          signing.gnupg.passphrase=${MAVEN_SIGNING_KEY_PASSWORD}
          EOF
          chmod 600 ~/.gradle/gradle.properties
          # Two-phase publish to handle both inter-module dep resolution AND
          # idempotent re-runs (when a previous fire shipped some modules
          # but not others, e.g. v4.0.1 shared-core landed on Maven Central
          # via the first GPG-cmd run but the loop died on the second
          # module's resolver lag).
          #
          # Phase 1 — publishToMavenLocal for all modules in dep order.
          # Seeds ~/.m2/repository/co/deepvoiceai/... so subsequent modules'
          # `api 'co.deepvoiceai:android-shared-core:4.0.1'` resolution
          # finds the artifact locally without waiting for Maven Central's
          # propagation (5-30 min CDN lag). Idempotent — re-running on a
          # populated cache is a no-op.
          #
          # Phase 2 — publishAndReleaseToMavenCentral, tolerating the
          # 'Component already exists' Sonatype rejection (Central Portal
          # forbids re-publishing the same version coordinate; this fires
          # on every retry after a partial success). Other failures
          # (signing, network, etc.) still propagate via the explicit
          # `exit 1`.
          MODULES="dvai-bridge-android-shared-core dvai-bridge-android-llama-core dvai-bridge-android-mediapipe-core dvai-bridge-android-litert-core dvai-bridge-android"

          echo "=== Phase 1: publishToMavenLocal (seed sibling-dep cache) ==="
          for module in $MODULES; do
              echo "==> mavenLocal: $module"
              (cd packages/$module/android && ./gradlew publishToMavenLocal --no-daemon --no-configuration-cache -PcompileSdkOverride=35)
          done

          echo
          echo "=== Phase 2: publishAndReleaseToMavenCentral ==="
          ANY_REAL_FAILURE=0
          for module in $MODULES; do
              echo "==> mavenCentral: $module"
              LOG=$(mktemp)
              if (cd packages/$module/android && ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-configuration-cache -PcompileSdkOverride=35) 2>&1 | tee "$LOG"; then
                  echo "    $module ✓ published"
              else
                  if grep -q "already exists" "$LOG"; then
                      echo "    $module ⊝ already at 4.0.1 on Maven Central — skipping"
                  else
                      echo "    $module ✗ REAL FAILURE — see log above"
                      ANY_REAL_FAILURE=1
                  fi
              fi
              rm -f "$LOG"
          done
          exit $ANY_REAL_FAILURE

  publish-cocoapods:
    name: Publish DVAIBridge.podspec to CocoaPods Trunk
    runs-on: macos-latest
    if: ${{ vars.COCOAPODS_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # The podspec references the v4.0.x release zip on GitHub;
          # the checkout needs the tag to be present locally for
          # pod-trunk's validation step to resolve the source URL.
          submodules: false
          fetch-depth: 0
      - name: Push DVAIBridge to CocoaPods Trunk
        # `--allow-warnings` is required because Apple's deprecation
        # warnings on CoreML APIs fire at lint time even when the
        # actual targets opt out. `--skip-import-validation` skips
        # the pod's own swift compile in trunk's lint sandbox; we
        # validated this locally before tagging via `pod lib lint`.
        # Re-runs against an already-published version exit 0 (trunk
        # rejects duplicates silently as "already pushed").
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          set -e
          # Podspec was moved to repo root in commit ce4bd64 ("chore: move
          # podspec to root for monorepo validation"). publish.yml wasn't
          # updated at the time — corrected here for v4.0.1+.
          pod trunk push DVAIBridge.podspec --allow-warnings --skip-import-validation

  publish-pub-dev:
    name: Publish dvai_bridge to pub.dev
    runs-on: ubuntu-latest
    if: ${{ vars.PUB_DEV_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      # pub.dev's OIDC publish flow needs id-token write; the
      # PUB_CREDENTIALS_JSON fallback (long-lived OAuth token) also
      # works without it — kept here for the OIDC upgrade path.
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
      - name: Authenticate with pub.dev (long-lived credentials JSON)
        # PUB_CREDENTIALS_JSON is the contents of `~/.config/dart/pub-credentials.json`
        # after a local `dart pub login`. The token doesn't expire as
        # long as the underlying Google account stays active. For a
        # more rotation-friendly setup, switch to OIDC via the
        # `dart-lang/setup-dart` action — but that requires linking
        # the package to a GitHub Actions identity on pub.dev's admin
        # page first. JSON works today; OIDC is the v4.0.2+ upgrade.
        run: |
          mkdir -p ~/.config/dart
          printf '%s' '${{ secrets.PUB_CREDENTIALS_JSON }}' > ~/.config/dart/pub-credentials.json
          chmod 600 ~/.config/dart/pub-credentials.json
      - name: dart pub publish
        # `--force` skips the interactive confirmation. Required for CI.
        # pub.dev rejects republishes of the same version with a clear
        # 409; the job fails-fast in that case which is the desired
        # behaviour (CI accidentally re-firing on the same tag).
        working-directory: packages/dvai-bridge-flutter
        run: |
          flutter pub get
          dart run pigeon --input pigeons/messages.dart
          dart pub publish --force

  # NuGet publish lives in test-dotnet.yml's macOS pack-and-push job —
  # that workflow already builds the iOS xcframework + bindings + 6
  # .nupkg artefacts in one place and pushes via `dotnet nuget push`
  # to api.nuget.org/v3/index.json on tag pushes. Duplicating it here
  # would double the macOS-runner cost without adding any safety, so
  # this stays a deliberate omission. Required secrets: NUGET_API_KEY
  # (NuGet.org → Account → API Keys, scope `Push › *`, owner = dvai org).
