name: Publish Packages

# CD pipeline for the npm/GitHub-Packages publish. Fires when either:
#   - A GitHub Release is published via the UI (release: published), or
#   - A v*.*.* tag is pushed (push: tags) — covers tag-first flows
#     where you cut the tag from the CLI before adding release notes.
#   - workflow_dispatch as a break-glass for republishes / dry runs.
#
# Concurrency: keyed on github.ref so a release-published + tag-push
# pair for the same version queues rather than running in parallel.
# The npm registry rejects duplicate-version publishes with 403, so
# at most one of the two will actually push artefacts; the other
# fails-fast and is harmless.

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dvai'

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm build

      - name: Publish to GitHub Packages
        run: |
          pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPR_TOKEN: ${{ secrets.GPR_TOKEN }}
