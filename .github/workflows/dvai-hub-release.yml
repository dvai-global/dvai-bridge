name: DVAI Hub — release binaries

# Triggered on every semver tag push (v*.*.*). Builds Windows .msi,
# macOS arm64 .dmg, and Linux .AppImage / .deb / .rpm, then attaches
# the artefacts to the auto-created GitHub Release.
#
# Required secrets (configured in repo settings):
#   APPLE_SIGNING_IDENTITY            "Developer ID Application: <Org> (<TEAM_ID>)"
#   APPLE_CERT_BASE64                 base64 of the .p12 cert
#   APPLE_CERT_PASSWORD               .p12 password
#   APPLE_NOTARIZATION_USERNAME       Apple ID
#   APPLE_NOTARIZATION_PASSWORD       app-specific password
#   APPLE_NOTARIZATION_TEAM_ID
#   WIN_SIGNING_CERT_BASE64           base64 of the .pfx cert
#   WIN_SIGNING_CERT_PASSWORD         .pfx password
#
# All signing steps gate on secret presence — missing secrets produce
# unsigned artefacts (SmartScreen / Gatekeeper warnings on first
# launch). Persistent code-signing TODO is tracked separately.

on:
  # Match every semver tag (v4.0.0, v4.0.1, v5.x.x, ...). The tag-only
  # filter keeps the heavy desktop-build jobs from firing on routine
  # main pushes. Matches the trigger model of the other CD workflows
  # (publish.yml, deploy-docs.yml).
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          # AppImage is intentionally absent: linuxdeploy-plugin-gtk runs
          # `ldd` on the Bun-compiled sidecar binary to walk shared-lib
          # dependencies, but `bun build --compile` produces a near-static
          # binary with its own embedded loader; ldd exits 1 and the
          # plugin aborts. .deb / .rpm don't trigger that code path.
          # Re-enable AppImage when we have a different sidecar
          # bundling strategy (tracked in TODO.md).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup MUST run before setup-node so that
      # setup-node's `cache: pnpm` can find pnpm on PATH. Aligned at
      # v10 with the rest of the workflows (deploy-docs, publish,
      # fixtures-lint, test-react-native) so they all read the same
      # pnpm-lock.yaml format consistently.
      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Bun bundles the Node sidecar into a single-file native binary
      # via `bun build --compile`. tauri.conf.json's beforeBuildCommand
      # invokes `pnpm bundle:sidecar` which delegates to bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # `libfuse2t64` is the Ubuntu 24.04 (`ubuntu-latest`) package that
       # provides legacy FUSE2 — required to *execute* the downloaded
       # `linuxdeploy-x86_64.AppImage` itself, which Tauri shells out
       # to during AppImage bundling. Without it `linuxdeploy` fails
       # silently with "failed to run linuxdeploy". `libxdo-dev` is on
       # Tauri 2's official Ubuntu deps list.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libfuse2t64 \
            build-essential \
            curl \
            wget \
            file \
            patchelf

      # `pnpm install` from repo root — the lockfile lives at the
      # workspace root, not in `hub/`. The `hub` package is wired up
      # via `pnpm-workspace.yaml`.
      #
      # `--ignore-scripts` skips the root `prepare` script which
      # `pnpm -r run build`s every workspace package (including ones
      # with cross-platform tsup issues unrelated to the Hub). We
      # rebuild only what the Hub needs — `@dvai-bridge/core` — in
      # the next step.
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build @dvai-bridge/core (Hub dep)
        run: pnpm --filter @dvai-bridge/core build

      - name: macOS — import signing cert
        if: matrix.os == 'macos-latest' && env.APPLE_CERT_BASE64 != ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import $RUNNER_TEMP/cert.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Windows — import signing cert
        if: matrix.os == 'windows-latest' && env.WIN_SIGNING_CERT_BASE64 != ''
        env:
          WIN_SIGNING_CERT_BASE64: ${{ secrets.WIN_SIGNING_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WIN_SIGNING_CERT_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WIN_SIGNING_CERT_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\\cert.pfx", $bytes)
        shell: pwsh

      # `pnpm tauri build` invokes the CLI in `hub/node_modules/.bin`.
      # tauri.conf.json's beforeBuildCommand chains the JS build,
      # sidecar bundling, and Vite frontend build automatically.
      #
      # Signing/notarization env handling:
      # - APPLE_SIGNING_IDENTITY falls back to `-` (codesign ad-hoc)
      #   when the cert secret is absent — empty string would make
      #   Tauri attempt to sign with identity "" and codesign would
      #   error with "specified item could not be found in the
      #   keychain".
      # - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID must be *unset*
      #   (not empty) for Tauri to skip notarization; otherwise
      #   Tauri proceeds and the App Store Connect API rejects with
      #   "Team ID must be at least 3 characters". GH Actions can't
      #   conditionally include env keys, so we unset them in shell
      #   when empty.
      # - Same treatment for TAURI_SIGNING_PRIVATE_KEY (update
      #   signing) — empty string enables update signing with no key.
      - name: Build Tauri app (unix)
        if: matrix.os != 'windows-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          for v in APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then unset "$v"; fi
          done
          pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --verbose
        shell: bash
        working-directory: hub

      - name: Build Tauri app (windows)
        if: matrix.os == 'windows-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY)) { Remove-Item Env:TAURI_SIGNING_PRIVATE_KEY }
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) { Remove-Item Env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD }
          pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --verbose
        shell: pwsh
        working-directory: hub

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dvai-hub-${{ matrix.os }}
          path: |
            hub/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            hub/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            hub/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            hub/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Extract release notes for this version
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section between `## [VERSION]` and the next `## [`
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {f=0}
            f
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section for $VERSION — falling back to full file."
            cp CHANGELOG.md release-notes.md
          fi
          echo "Wrote release-notes.md ($(wc -l < release-notes.md) lines)"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DVAI Hub ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            artefacts/**/*.msi
            artefacts/**/*.dmg
            artefacts/**/*.deb
            artefacts/**/*.rpm
          fail_on_unmatched_files: true
