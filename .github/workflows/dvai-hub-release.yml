name: DVAI Hub — release binaries

# Triggered when a v3.1.* tag is pushed. Builds Windows .msi, macOS
# universal .dmg (notarized), and Linux .AppImage / .deb / .rpm; then
# attaches the artefacts to the corresponding GitHub Release.
#
# Required secrets (configured in repo settings):
#   APPLE_SIGNING_IDENTITY            "Developer ID Application: <Org> (<TEAM_ID>)"
#   APPLE_CERT_BASE64                 base64 of the .p12 cert
#   APPLE_CERT_PASSWORD               .p12 password
#   APPLE_NOTARIZATION_USERNAME       Apple ID
#   APPLE_NOTARIZATION_PASSWORD       app-specific password
#   APPLE_NOTARIZATION_TEAM_ID
#   WIN_SIGNING_CERT_BASE64           base64 of the .pfx cert
#   WIN_SIGNING_CERT_PASSWORD         .pfx password
#
# A separate sister file `HUB-SIGNING-CERTS.md` (gitignored) documents
# the procurement and rotation process for these credentials.

on:
  push:
    tags:
      - "v3.1.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: macos-latest
            target: universal-apple-darwin
            bundle: dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: appimage,deb,rpm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # Bun bundles the Node sidecar into a single-file native binary
      # via `bun build --compile`. tauri.conf.json's beforeBuildCommand
      # invokes `pnpm bundle:sidecar` which delegates here.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm deps
        run: |
          pnpm install --frozen-lockfile
        working-directory: hub

      - name: Build peer-mode TypeScript
        run: pnpm build:peer-mode
        working-directory: hub

      # Signing steps are gated on secret presence — when the cert
      # secrets are absent (e.g. early v3.1 unsigned releases), the
      # workflow still produces installable artefacts. End users see
      # SmartScreen / Gatekeeper warnings on first launch. See
      # `TODO.md` for the persistent code-signing TODO.
      - name: macOS — import signing cert
        if: matrix.os == 'macos-latest' && env.APPLE_CERT_BASE64 != ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import $RUNNER_TEMP/cert.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Windows — import signing cert
        if: matrix.os == 'windows-latest' && env.WIN_SIGNING_CERT_BASE64 != ''
        env:
          WIN_SIGNING_CERT_BASE64: ${{ secrets.WIN_SIGNING_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WIN_SIGNING_CERT_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WIN_SIGNING_CERT_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\\cert.pfx", $bytes)
        shell: pwsh

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
        working-directory: hub

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dvai-hub-${{ matrix.os }}
          path: |
            hub/src-tauri/target/${{ matrix.target }}/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "DVAI Hub ${GITHUB_REF_NAME}" \
            --notes-file CHANGELOG.md \
            artefacts/**/*
