name: Smoke — real models

# On-demand + release-gate smoke test using a small public GGUF model.
# Verifies mechanics (load → respond → free) only, not output quality.
# iOS uses the self-hosted ARM64 macOS runner; Android uses an
# emulated runner — both expensive, so we don't fire on every PR.
#
# Trigger model (matches the transformers.js / llama.cpp posture on
# expensive jobs):
#   - workflow_dispatch: ad-hoc, with optional model overrides.
#   - release: types: [published]: final gate after you click
#     "Publish release" in the GitHub UI, before consumers pull
#     the new version from npm / Maven / NuGet / pub.dev.
# No cron — nightly smokes without a watch rotation are noise.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Override GGUF download URL (must be a small public file).'
        required: false
        default: ''
      model_sha256:
        description: 'sha256 of the GGUF (lowercase hex).'
        required: false
        default: ''

concurrency:
  group: smoke-real-models-${{ github.ref }}
  cancel-in-progress: false

env:
  # Default smoke model — small text-only GGUF (~670 MB) used by the
  # text-only end-to-end smoke. Override via workflow_dispatch inputs for
  # ad-hoc runs. NOTE: maintainer must populate the matching repository
  # secrets before the first scheduled invocation; the workflow will warn
  # and skip when SMOKE_MODEL_* are missing.
  SMOKE_MODEL_URL: ${{ inputs.model_url || secrets.SMOKE_MODEL_URL }}
  SMOKE_MODEL_SHA256: ${{ inputs.model_sha256 || secrets.SMOKE_MODEL_SHA256 }}
  # Vision/audio smoke uses a vision-capable model + mmproj pair (e.g.
  # gemma 4 + gemma4v mmproj). Optional — vision/audio smoke methods
  # XCTSkip / Assume.skip when these are unset, so the workflow stays
  # green even before the secrets land.
  SMOKE_VISION_MODEL_URL: ${{ secrets.SMOKE_VISION_MODEL_URL }}
  SMOKE_VISION_MODEL_SHA256: ${{ secrets.SMOKE_VISION_MODEL_SHA256 }}
  SMOKE_VISION_MMPROJ_URL: ${{ secrets.SMOKE_VISION_MMPROJ_URL }}
  SMOKE_VISION_MMPROJ_SHA256: ${{ secrets.SMOKE_VISION_MMPROJ_SHA256 }}

jobs:
  ios-smoke:
    name: iOS smoke (capacitor-llama)
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 45
    defaults:
      run:
        working-directory: packages/dvai-bridge-capacitor-llama/ios
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify smoke model env present
        run: |
          if [ -z "$SMOKE_MODEL_URL" ] || [ -z "$SMOKE_MODEL_SHA256" ]; then
            echo "::warning::SMOKE_MODEL_URL / SMOKE_MODEL_SHA256 not set — skipping smoke."
            exit 0
          fi

      - name: xcodebuild test (real-model scheme — per-method isolation)
        # Each smoke test method runs in its own xcodebuild invocation, so
        # the xctest process is fresh per case. Simulator memory pressure
        # accumulates across tests in the same process (model mmaps + ggml
        # buffers don't fully release on unload), and a 4 GB Gemma-4 +
        # mmproj load on top of leftover Llama state was reliably OOM-ing
        # the simulator with SIGKILL. Per-method invocations sidestep that
        # at the cost of a few extra build/launch cycles per run.
        #
        # xcodebuild env injection: `TEST_RUNNER_<NAME>=<VAL>` build-
        # settings appear inside the simulator-hosted unit-test process
        # with the prefix stripped, so test code reads
        # `ProcessInfo.processInfo.environment["SMOKE_MODEL_URL"]`
        # unchanged. The older SIMCTL_CHILD_* channel only reaches
        # XCUITest runners, not unit-test bundles. SMOKE_* values come
        # from the workflow-level `env:` block.
        env:
          IOS_DEST: 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
        run: |
          # Construct TEST_RUNNER_<NAME>=<VAL> args once and reuse for
          # every per-method invocation. Empty values are skipped so the
          # test still XCTSkips cleanly when an optional secret isn't
          # configured.
          RUNNER_ENV_ARGS=()
          while IFS='=' read -r name value; do
            if [ -n "$name" ] && [ -n "$value" ]; then
              RUNNER_ENV_ARGS+=("TEST_RUNNER_${name}=${value}")
            fi
          done < <(env | grep '^SMOKE_' || true)

          set +e
          OVERALL_RC=0
          for METHOD in testSmokeRealModelEndToEnd testSmokeVisionEndToEnd testSmokeAudioEndToEnd; do
            BUNDLE="build/test-results-${METHOD}.xcresult"
            rm -rf "$BUNDLE"
            echo "::group::xcodebuild test — $METHOD"
            xcodebuild test \
              -scheme DVAICapacitorLlama \
              -destination "$IOS_DEST" \
              -only-testing:"DVAICapacitorLlamaTests/RealModelSmokeTest/$METHOD" \
              -resultBundlePath "$BUNDLE" \
              "${RUNNER_ENV_ARGS[@]}"
            RC=$?
            echo "::endgroup::"
            if [ $RC -ne 0 ]; then
              echo "::warning::$METHOD exited with code $RC"
              OVERALL_RC=$RC
            fi
          done
          exit $OVERALL_RC

      - name: Upload xcresults
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-ios-xcresults
          path: packages/dvai-bridge-capacitor-llama/ios/build/test-results-*.xcresult
          retention-days: 14
          if-no-files-found: ignore

  android-smoke:
    name: Android smoke (capacitor-llama)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Verify smoke model env present
        run: |
          if [ -z "$SMOKE_MODEL_URL" ] || [ -z "$SMOKE_MODEL_SHA256" ]; then
            echo "::warning::SMOKE_MODEL_URL / SMOKE_MODEL_SHA256 not set — skipping smoke."
            exit 0
          fi

      - name: connectedAndroidTest (real-model class)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: packages/dvai-bridge-capacitor-llama/android
          # Forward the SMOKE_* secrets to the instrumentation runner as
          # `smoke_*` arguments. The tests read them via
          # `InstrumentationRegistry.getArguments().getString(...)` and skip
          # cleanly via `Assume.assumeTrue` when an arg is missing — that
          # lets vision/audio smoke be opt-in based on which secrets are
          # actually configured.
          script: |
            ARGS=(
              "-Pandroid.testInstrumentationRunnerArguments.class=co.deepvoiceai.dvaibridge.llama.RealModelSmokeTest"
            )
            [ -n "$SMOKE_MODEL_URL" ] && ARGS+=("-Pandroid.testInstrumentationRunnerArguments.smoke_model_url=$SMOKE_MODEL_URL")
            [ -n "$SMOKE_MODEL_SHA256" ] && ARGS+=("-Pandroid.testInstrumentationRunnerArguments.smoke_model_sha256=$SMOKE_MODEL_SHA256")
            [ -n "$SMOKE_VISION_MODEL_URL" ] && ARGS+=("-Pandroid.testInstrumentationRunnerArguments.smoke_vision_model_url=$SMOKE_VISION_MODEL_URL")
            [ -n "$SMOKE_VISION_MODEL_SHA256" ] && ARGS+=("-Pandroid.testInstrumentationRunnerArguments.smoke_vision_model_sha256=$SMOKE_VISION_MODEL_SHA256")
            [ -n "$SMOKE_VISION_MMPROJ_URL" ] && ARGS+=("-Pandroid.testInstrumentationRunnerArguments.smoke_vision_mmproj_url=$SMOKE_VISION_MMPROJ_URL")
            [ -n "$SMOKE_VISION_MMPROJ_SHA256" ] && ARGS+=("-Pandroid.testInstrumentationRunnerArguments.smoke_vision_mmproj_sha256=$SMOKE_VISION_MMPROJ_SHA256")
            ./gradlew connectedAndroidTest "${ARGS[@]}" --no-daemon --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-android-reports
          path: packages/dvai-bridge-capacitor-llama/android/build/reports/
          retention-days: 14
          if-no-files-found: ignore
