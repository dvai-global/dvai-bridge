name: Fixtures Lint

on:
  pull_request:
    paths:
      - 'fixtures/**'
      - 'packages/dvai-bridge-core/src/__tests__/fixtures-shape.test.ts'
  push:
    branches:
      - main
    paths:
      - 'fixtures/**'

jobs:
  fixtures-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test fixtures-shape -- --run
      - name: Validate JSON parses
        run: node -e "JSON.parse(require('fs').readFileSync('fixtures/transport-fixtures.json', 'utf8'))"
