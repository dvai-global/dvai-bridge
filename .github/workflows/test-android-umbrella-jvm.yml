name: Android JVM — dvai-bridge umbrella

on:
  pull_request:
    paths:
      - 'packages/dvai-bridge-android/**'
      - 'packages/dvai-bridge-android-shared-core/**'
      - 'packages/dvai-bridge-android-llama-core/**'
      - 'packages/dvai-bridge-android-mediapipe-core/**'
      - 'packages/dvai-bridge-android-litert-core/**'
      - '.github/workflows/test-android-umbrella-jvm.yml'
  # Release-tag-only push trigger.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: android-umbrella-jvm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm-test:
    name: dvai-bridge umbrella JVM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/dvai-bridge-android/android
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-umbrella-${{ hashFiles('packages/dvai-bridge-android*/android/**/*.gradle*', 'packages/dvai-bridge-android/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-umbrella-

      - name: Publish all 4 cores to mavenLocal
        working-directory: ${{ github.workspace }}
        run: |
          (cd packages/dvai-bridge-android-shared-core/android && ./gradlew publishToMavenLocal --no-daemon --stacktrace)
          (cd packages/dvai-bridge-android-llama-core/android && ./gradlew publishToMavenLocal --no-daemon --stacktrace)
          (cd packages/dvai-bridge-android-mediapipe-core/android && ./gradlew publishToMavenLocal --no-daemon --stacktrace)
          (cd packages/dvai-bridge-android-litert-core/android && ./gradlew publishToMavenLocal --no-daemon --stacktrace)

      - run: ./gradlew testDebugUnitTest assembleRelease --no-daemon --stacktrace

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-umbrella-reports
          path: packages/dvai-bridge-android/android/build/reports/
          retention-days: 14
          if-no-files-found: ignore
