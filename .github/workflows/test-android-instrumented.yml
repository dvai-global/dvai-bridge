name: Android instrumented — audio decoder

# Runs the AudioDecoderInstrumentedTest in capacitor-llama on a real
# emulator. MediaCodec / MediaExtractor cannot be Robolectric-mocked
# faithfully, so this is the only path that exercises the audio decode
# pipeline against the real Android framework.

on:
  pull_request:
    paths:
      - 'packages/dvai-bridge-capacitor-llama/android/src/main/java/**/AudioDecoder*'
      - 'packages/dvai-bridge-capacitor-llama/android/src/androidTest/**'
      - 'fixtures/audio/**'
      - '.github/workflows/test-android-instrumented.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/dvai-bridge-capacitor-llama/android/src/main/java/**/AudioDecoder*'
      - 'packages/dvai-bridge-capacitor-llama/android/src/androidTest/**'
      - 'fixtures/audio/**'

concurrency:
  group: android-instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emulator-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: '21'

      - name: Enable KVM (required by emulator runner)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64

      - name: Create AVD + boot snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: connectedAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: packages/dvai-bridge-capacitor-llama/android
          script: ./gradlew connectedAndroidTest --no-daemon --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-reports
          path: packages/dvai-bridge-capacitor-llama/android/build/reports/
          retention-days: 7
