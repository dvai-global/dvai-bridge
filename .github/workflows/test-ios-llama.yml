name: iOS — llama (core + capacitor wrapper)

on:
  pull_request:
    paths:
      - 'packages/dvai-bridge-ios-llama-core/**'
      - 'packages/dvai-bridge-capacitor-llama/ios/**'
      - 'packages/dvai-bridge-capacitor/src/**'
      - 'fixtures/**'
      - 'scripts/mac-side-*.sh'
      - '.github/workflows/test-ios-llama.yml'
  # Release-tag-only push trigger. Routine `git push origin main`
  # does NOT fire CI; use a PR for pre-merge validation or
  # workflow_dispatch for an ad-hoc run.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: ios-llama-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-xctest:
    name: ios-llama-core XCTest
    runs-on: [self-hosted, macOS, ARM64]
    # Bumped from 30 -> 60 in v4.0.1 prep — see wrapper-xctest below
    # for full context. Cold-build of the llama.xcframework binary
    # targets via SwiftPM resolution can take 30+min on the
    # zer0-mac-pro runner.
    timeout-minutes: 60
    defaults:
      run:
        working-directory: packages/dvai-bridge-ios-llama-core
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Clear stale xcresult bundle
        run: rm -rf build/test-results.xcresult

      - name: xcodebuild test
        env:
          IOS_DEST: 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
        run: |
          xcodebuild test \
            -scheme DVAILlamaCore-Package \
            -destination "$IOS_DEST" \
            -resultBundlePath build/test-results.xcresult

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresult-llama-core
          path: packages/dvai-bridge-ios-llama-core/build/test-results.xcresult
          retention-days: 7

  wrapper-xctest:
    name: capacitor-llama wrapper XCTest
    runs-on: [self-hosted, macOS, ARM64]
    # Bumped from 30 -> 60 in v4.0.1 prep: the wrapper's DerivedData is
    # separate from ios-llama-core's, so cold-cache CI runs have to
    # re-resolve the full SwiftPM graph (Hummingbird + swift-nio +
    # mlx-swift) and re-compile the chained llama.xcframework binary
    # targets. Observed 35min cold-build on the zer0-mac-pro runner —
    # 30min timeout was triggering cancellation pre-test (run
    # 26359154540 cancelled at 30:00). Core-xctest itself usually
    # finishes in <2min on warm cache but its first cold build hits
    # the same kind of cost; matched at 60min for symmetry.
    timeout-minutes: 60
    needs: core-xctest
    defaults:
      run:
        working-directory: packages/dvai-bridge-capacitor-llama/ios
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Clear stale xcresult bundle
        run: rm -rf build/test-results.xcresult

      - name: xcodebuild test
        env:
          IOS_DEST: 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
        run: |
          xcodebuild test \
            -scheme DVAICapacitorLlama \
            -destination "$IOS_DEST" \
            -resultBundlePath build/test-results.xcresult

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcresult-llama-wrapper
          path: packages/dvai-bridge-capacitor-llama/ios/build/test-results.xcresult
          retention-days: 7
