name: Android JVM — shared-core

on:
  pull_request:
    paths:
      - 'packages/dvai-bridge-android-shared-core/**'
      - '.github/workflows/test-android-shared-core-jvm.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/dvai-bridge-android-shared-core/**'

concurrency:
  group: android-shared-core-jvm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm-test:
    name: android-shared-core JVM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/dvai-bridge-android-shared-core/android
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-shared-core-${{ hashFiles('packages/dvai-bridge-android-shared-core/android/**/*.gradle*', 'packages/dvai-bridge-android-shared-core/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-shared-core-

      - run: ./gradlew testDebugUnitTest assembleRelease --no-daemon --stacktrace

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-shared-core-reports
          path: packages/dvai-bridge-android-shared-core/android/build/reports/
          retention-days: 14
          if-no-files-found: ignore
