# Dependabot configuration for DVAI Bridge.
#
# Weekly updates for the dependencies that change often enough to matter
# (npm, GitHub Actions) and weekly updates for the platform-native build
# files (Gradle, NuGet) which change less often but pile up if not nudged.
#
# Each ecosystem opens at most 5 concurrent PRs and labels them so the
# Labeler workflow doesn't need to re-classify them.

version: 2
updates:
  # Root npm workspace — picks up every packages/* and their devDeps.
  # The dev-dependencies group rolls things like vitest/tsup/types updates
  # into a single PR instead of one per package, which would otherwise
  # spam the queue on minor version bumps.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels: ["dependencies", "area: dependencies"]
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # Docs is its own workspace member with vitepress / vue.
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 3
    labels: ["dependencies", "area: docs"]

  # GitHub Actions used in workflows (actions/checkout, setup-node,
  # ssh-agent, etc.). Critical for security — third-party actions
  # without SHA pinning are a real supply-chain risk.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "area: ci"]

  # Android packages — Gradle deps move slower; weekly is fine.
  - package-ecosystem: "gradle"
    directory: "/packages/dvai-bridge-android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "platform: android"]

  - package-ecosystem: "gradle"
    directory: "/packages/dvai-bridge-android-llama-core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "platform: android"]

  # .NET packages.
  - package-ecosystem: "nuget"
    directory: "/packages/dvai-bridge-dotnet"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "platform: dotnet"]

  # Flutter / pub.dev. dependabot supports pub since 2023.
  - package-ecosystem: "pub"
    directory: "/packages/dvai-bridge-flutter"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "platform: flutter"]
