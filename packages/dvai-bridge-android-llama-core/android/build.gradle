buildscript {
    ext {
        kotlinVersion = '2.3.21'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

ext {
    junitVersion = '4.13.2'
    androidxAppCompatVersion = '1.7.1'
    coroutinesVersion = '1.10.2'
    // Pinned within Ktor 2.x — Ktor 3 has breaking API changes around server
    // configuration that would require non-trivial refactors. Stay on the
    // latest 2.x patch (2.3.13) until a deliberate Ktor 3 migration.
    ktorVersion = '2.3.13'
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // Phase 3D: shared-core lives here in dev (after `publishToMavenLocal`).
        // Production publishes resolve from GitHub Packages; consumers add the
        // `maven { url = uri("https://maven.pkg.github.com/Westenets/dvai-bridge") }`
        // entry to their settings.gradle as documented in the consumer guide.
        mavenLocal()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'maven-publish'

android {
    namespace 'co.deepvoiceai.bridge.llama.core'
    // Phase 2 Task 3 (examples) library fix: see shared-core/android/build.gradle
    // for the rationale — `-PcompileSdkOverride=35` lets Windows hosts sidestep
    // an AGP 9.2.0 parseLocalResources bug against android-36's public-final.xml.
    compileSdk(project.findProperty('compileSdkOverride')?.toInteger() ?: 36)

    defaultConfig {
        minSdk 24
        targetSdk(project.findProperty('compileSdkOverride')?.toInteger() ?: 36)
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
        externalNativeBuild {
            cmake {
                // 16 KB page-size alignment per Google's 2025 mandate. NDK r27+
                // ships 16 KB by default for new builds; the explicit linker
                // flag enforces it on toolchains that haven't flipped the
                // default and survives toolchain bumps.
                cppFlags "-std=c++17 -O3 -fPIC"
                arguments "-DANDROID_STL=c++_shared",
                          "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,max-page-size=16384"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
            version '3.22.1'
        }
    }

    ndkVersion '27.1.12297006'

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

// AGP 9 / Kotlin 2.x: the legacy android.kotlinOptions block is gone. The
// replacement is the standalone `kotlin { compilerOptions { ... } }` extension
// (provided by AGP's built-in Kotlin integration).
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    // Phase 3D: HttpServer + HandlerDispatch + HandlerContext + DvaiHandlers
    // + CorsConfig moved here from this module's `co.deepvoiceai.bridge.llama.core`
    // package. Declared as `api` (not `implementation`) so consumer projects
    // — Capacitor wrappers, the dvai-bridge-android umbrella, downstream
    // apps — see the moved types transitively without re-declaring the dep.
    api "co.deepvoiceai:android-shared-core:$dvaiBridgeVersion"

    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "io.ktor:ktor-server-core:$ktorVersion"
    implementation "io.ktor:ktor-server-cio:$ktorVersion"
    implementation "io.ktor:ktor-server-cors:$ktorVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$coroutinesVersion"
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.11.0'
    // OkHttp powers the resumable Range-download path in ModelDownloader.
    implementation 'com.squareup.okhttp3:okhttp:5.3.2'

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$coroutinesVersion"
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation "io.ktor:ktor-server-test-host:$ktorVersion"
    testImplementation 'com.squareup.okhttp3:mockwebserver:5.3.2'

    // Instrumented tests (run on device/emulator). MediaCodec isn't available
    // in JVM unit tests, so AudioDecoder's decode paths are exercised here.
    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
}

// Phase 3D Task 4: each Android package is its own Gradle root, so a shared
// `buildSrc/dvai-publishing.gradle.kts` convention plugin would have to be
// duplicated into every package's buildSrc/ directory anyway — defeating
// the point. Copy-paste the publishing block instead; if/when the monorepo
// is restructured under a single root settings.gradle, consolidate then.
afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                groupId = 'co.deepvoiceai'
                artifactId = 'android-llama-core'
                version = (project.findProperty('dvaiBridgeVersion') ?: '3.0.0').toString()
                from components.release
            }
        }
        repositories {
            maven {
                name = 'GitHubPackages'
                url = uri('https://maven.pkg.github.com/Westenets/dvai-bridge')
                credentials {
                    username = project.findProperty('gpr.user') ?: System.getenv('GITHUB_ACTOR')
                    password = project.findProperty('gpr.key') ?: System.getenv('GITHUB_TOKEN')
                }
            }
        }
    }
}
