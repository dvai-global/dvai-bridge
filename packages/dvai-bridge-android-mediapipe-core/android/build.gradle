buildscript {
    ext {
        kotlinVersion = '2.3.21'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

ext {
    junitVersion = '4.13.2'
    androidxAppCompatVersion = '1.7.1'
    coroutinesVersion = '1.10.2'
    // Pinned within Ktor 2.x — Ktor 3 has breaking API changes around server
    // configuration that would require non-trivial refactors. Stay on the
    // latest 2.x patch (2.3.13) until a deliberate Ktor 3 migration.
    ktorVersion = '2.3.13'
    // MediaPipe LLM dependencies — Phase 3B replaces with LiteRT-LM
    //
    // 0.10.33 is the floor for vision support: it exposes
    // `LlmInferenceSession` (Task 46), `LlmInferenceSession.addImage(MPImage)`,
    // `GraphOptions.setEnableVisionModality(true)`, and
    // `LlmInferenceOptions.setMaxNumImages(int)`. The 0.10.14 baseline used in
    // Task 45 lacked all of these.
    //
    // `MPImage` + `BitmapImageBuilder` live in `tasks-core`, which `tasks-genai`
    // forgets to declare in its POM (it uses the classes from
    // `LlmInferenceSession.addImage`). We pin the same version explicitly so
    // the classes resolve at compile time. Keep `mediapipeCoreVersion` and
    // `mediapipeGenaiVersion` in sync on every bump.
    mediapipeGenaiVersion = '0.10.33'
    mediapipeCoreVersion = '0.10.33'
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// AGP 9+ ships built-in Kotlin support; the standalone 'kotlin-android'
// plugin is no longer needed (and is rejected by the build).
// See https://kotl.in/gradle/agp-built-in-kotlin
apply plugin: 'com.android.library'

android {
    namespace 'co.deepvoiceai.bridge.mediapipe.core'
    compileSdk 36

    defaultConfig {
        minSdk 24
        targetSdk 36
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }
}

// AGP 9 / Kotlin 2.x: the legacy android.kotlinOptions block is gone. The
// replacement is the standalone `kotlin { compilerOptions { ... } }` extension
// (provided by AGP's built-in Kotlin integration).
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "io.ktor:ktor-server-core:$ktorVersion"
    implementation "io.ktor:ktor-server-cio:$ktorVersion"
    implementation "io.ktor:ktor-server-cors:$ktorVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$coroutinesVersion"
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.11.0'
    implementation 'com.squareup.okhttp3:okhttp:5.3.2'

    // Google MediaPipe LLM Inference (Gemma, Phi-3.5, Falcon, StableLM-Zephyr).
    // ~100MB native libs per ABI — first build will be slow.
    implementation "com.google.mediapipe:tasks-genai:$mediapipeGenaiVersion"
    // tasks-core supplies `MPImage` + `BitmapImageBuilder`; required for
    // vision-capable Gemma tasks (`LlmInferenceSession.addImage`). See the
    // ext-block comment for why this isn't transitively pulled by tasks-genai.
    implementation "com.google.mediapipe:tasks-core:$mediapipeCoreVersion"

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$coroutinesVersion"
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation "io.ktor:ktor-server-test-host:$ktorVersion"
    testImplementation 'com.squareup.okhttp3:mockwebserver:5.3.2'

    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
}
