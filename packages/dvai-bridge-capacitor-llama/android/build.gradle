buildscript {
    ext {
        kotlinVersion = '1.9.22'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.4'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

ext {
    junitVersion = '4.13.2'
    androidxAppCompatVersion = '1.6.1'
    capacitorVersion = '6.0.0'
    coroutinesVersion = '1.7.3'
    ktorVersion = '2.3.7'
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'co.deepvoiceai.dvaibridge.llama'
    compileSdk 34

    defaultConfig {
        minSdk 24
        targetSdk 34
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'  // arm64 is primary; x86_64 for emulator
        }
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O3 -fPIC"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
            version '3.22.1'
        }
    }

    ndkVersion '26.1.10909125'

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "com.capacitorjs:core:$capacitorVersion"
    implementation "io.ktor:ktor-server-core:$ktorVersion"
    implementation "io.ktor:ktor-server-cio:$ktorVersion"
    implementation "io.ktor:ktor-server-cors:$ktorVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$coroutinesVersion"
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.2'
    // OkHttp powers the resumable Range-download path in ModelDownloader.
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$coroutinesVersion"
    testImplementation 'org.robolectric:robolectric:4.11.1'
    testImplementation "io.ktor:ktor-server-test-host:$ktorVersion"
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'
}
