buildscript {
    ext {
        kotlinVersion = '2.3.21'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

ext {
    junitVersion = '4.13.2'
    androidxAppCompatVersion = '1.7.1'
    capacitorVersion = '8.3.1'
    coroutinesVersion = '1.10.2'
    // Pinned within Ktor 2.x — Ktor 3 has breaking API changes around server
    // configuration that would require non-trivial refactors. Stay on the
    // latest 2.x patch (2.3.13) until a deliberate Ktor 3 migration.
    ktorVersion = '2.3.13'
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// AGP 9+ ships built-in Kotlin support; the standalone 'kotlin-android'
// plugin is no longer needed (and is rejected by the build).
// See https://kotl.in/gradle/agp-built-in-kotlin
apply plugin: 'com.android.library'

android {
    namespace 'co.deepvoiceai.dvaibridge.llama'
    compileSdk 36

    defaultConfig {
        minSdk 24
        targetSdk 36
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'  // arm64 is primary; x86_64 for emulator
        }
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -O3 -fPIC"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
            version '3.22.1'
        }
    }

    ndkVersion '27.1.12297006'

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }
}

// AGP 9 / Kotlin 2.x: the legacy android.kotlinOptions block is gone. The
// replacement is the standalone `kotlin { compilerOptions { ... } }` extension
// (provided by AGP's built-in Kotlin integration).
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "com.capacitorjs:core:$capacitorVersion"
    implementation "io.ktor:ktor-server-core:$ktorVersion"
    implementation "io.ktor:ktor-server-cio:$ktorVersion"
    implementation "io.ktor:ktor-server-cors:$ktorVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$coroutinesVersion"
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.11.0'
    // OkHttp powers the resumable Range-download path in ModelDownloader.
    implementation 'com.squareup.okhttp3:okhttp:5.3.2'

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$coroutinesVersion"
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation "io.ktor:ktor-server-test-host:$ktorVersion"
    testImplementation 'com.squareup.okhttp3:mockwebserver:5.3.2'

    // Instrumented tests (run on device/emulator). MediaCodec isn't available
    // in JVM unit tests, so AudioDecoder's decode paths are exercised here.
    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
}
