// Shared-core module — pure Kotlin + Ktor. No JNI, no native code, no Android UI deps.
// Every other Android core (llama / mediapipe / litert) and the umbrella
// dvai-bridge-android module depend on this as `implementation
// "co.deepvoiceai:android-shared-core:<version>"` resolved via mavenLocal in
// dev (and via GitHub Packages in production).

buildscript {
    ext {
        kotlinVersion = '2.3.21'
    }
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
        // Phase 3 Task 8b: enables `@Serializable` codegen for the new
        // discovery/capability/pairing data classes.
        classpath "org.jetbrains.kotlin:kotlin-serialization:$kotlinVersion"
        // Maven Central publishing — wraps maven-publish + signing + the
        // Central Portal upload API into one config block. See the
        // mavenPublishing { ... } block below.
        classpath 'com.vanniktech:gradle-maven-publish-plugin:0.30.0'
    }
}

ext {
    junitVersion = '4.13.2'
    coroutinesVersion = '1.10.2'
    // Pinned within Ktor 2.x; matches the rest of the Android cores. Ktor 3
    // has breaking API changes around server config — coordinate any bump
    // across all four cores at once.
    ktorVersion = '2.3.13'
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'
apply plugin: 'com.vanniktech.maven.publish'
// Phase 3 Task 8b: enables `@Serializable` codegen on the Kotlin compile
// classpath. Pairs with the runtime `kotlinx-serialization-json` dep.
apply plugin: 'org.jetbrains.kotlin.plugin.serialization'

android {
    namespace 'co.deepvoiceai.bridge.shared.core'
    // Phase 2 Task 3 (examples) library fix: compileSdk is overridable via
    // the `compileSdkOverride` Gradle property so the example apps in
    // `examples/android-*` can pin a specific platform without editing the
    // SDK source. Default is 36 to match the rest of the cores; AGP 9.2.0
    // has a `parseLocalResources` parser bug on Windows when reading
    // `android-36/data/res/values/public-final.xml` (manifests as
    // `For input string: "01010<spaces>... lt 0x01010544"`); falling back
    // via `-PcompileSdkOverride=35` is a clean Windows workaround.
    compileSdk(project.findProperty('compileSdkOverride')?.toInteger() ?: 36)

    defaultConfig {
        minSdk 24
        targetSdk(project.findProperty('compileSdkOverride')?.toInteger() ?: 36)
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

// AGP 9 / Kotlin 2.x: the legacy android.kotlinOptions block is gone. The
// replacement is the standalone `kotlin { compilerOptions { ... } }` extension.
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    implementation "io.ktor:ktor-server-core:$ktorVersion"
    implementation "io.ktor:ktor-server-cio:$ktorVersion"
    implementation "io.ktor:ktor-server-cors:$ktorVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$coroutinesVersion"
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.11.0'
    // OkHttp powers the resumable Range-download path — moves into shared-core
    // alongside ModelDownloader in Phase 3D Task 14 (umbrella `downloadModel`).
    // Declared as an api dep so consumer cores re-expose it transitively.
    api 'com.squareup.okhttp3:okhttp:5.3.2'

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$coroutinesVersion"
    testImplementation 'org.robolectric:robolectric:4.16.1'
    // Phase 3 Task 8b: ApplicationProvider for tests that need a Context
    // (CapabilityCache + PairingStore JSON-on-disk adapters under cacheDir).
    testImplementation 'androidx.test:core:1.7.0'
    testImplementation 'androidx.test.ext:junit:1.3.0'
    testImplementation "io.ktor:ktor-server-test-host:$ktorVersion"
    testImplementation 'com.squareup.okhttp3:mockwebserver:5.3.2'

    // Phase 3 Task 8b: instrumented mDNS / NsdManager round-trip test
    // (gated behind `connectedAndroidTest`, see
    // discovery/NsdDiscoveryInstrumentedTest.kt for the rationale).
    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test:core:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
}

// Maven Central publishing via Sonatype Central Portal. See the
// PUBLISHING-MAVEN-CENTRAL.md note at the repo root (gitignored — your
// operator playbook) for credentials + the per-release sequence.
//
// Coordinates and POM metadata live here; the actual publish is driven
// by `./gradlew publishAndReleaseToMavenCentral` (auto-release on
// validation passing) or `publishToMavenLocal` for a dry-run that
// writes the artifacts + signatures to ~/.m2/repository/.
mavenPublishing {
    publishToMavenCentral(com.vanniktech.maven.publish.SonatypeHost.CENTRAL_PORTAL, true)
    signAllPublications()

    coordinates(
        'co.deepvoiceai',
        'android-shared-core',
        (project.findProperty('dvaiBridgeVersion') ?: '4.0.0').toString(),
    )

    pom {
        name = 'DVAI Bridge Android — Shared Core'
        description = 'Pure-Kotlin shared HTTP-server + handler-dispatch + ' +
                'discovery primitives shared by every DVAI Bridge Android backend.'
        inceptionYear = '2026'
        url = 'https://github.com/dvai-global/dvai-bridge'

        licenses {
            license {
                name = 'DVAI Bridge Community Licence v1.0'
                url = 'https://bridge.deepvoiceai.co/licensing'
                distribution = 'repo'
            }
        }
        developers {
            developer {
                id = 'deepvoiceai'
                name = 'Deep Voice AI Limited'
                email = 'info@deepvoiceai.co'
                organization = 'Deep Voice AI Limited'
                organizationUrl = 'https://deepvoiceai.co'
            }
        }
        scm {
            url = 'https://github.com/dvai-global/dvai-bridge'
            connection = 'scm:git:git://github.com/dvai-global/dvai-bridge.git'
            developerConnection = 'scm:git:ssh://github.com:dvai-global/dvai-bridge.git'
        }
    }
}
