name: dvai_bridge
description: Local-LLM bridge with an OpenAI-compatible HTTP server for Flutter (iOS + Android). Wraps the native DVAIBridge SDKs via Pigeon-generated platform channels.
version: 4.0.0
homepage: https://github.com/dvai-global/dvai-bridge
repository: https://github.com/dvai-global/dvai-bridge
issue_tracker: https://github.com/dvai-global/dvai-bridge/issues
documentation: https://dvai-bridge.deepvoiceai.co/guide/flutter-sdk

# Floor pinned at Flutter 3.39 (current stable −2 minor); Pigeon 26 generates
# Dart 3.7-compatible code, so consumers below Flutter 3.41 still consume the
# generated bindings cleanly. CI exercises 3.41.5 (latest) and 3.39.x (floor).
environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.39.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.16.0
  # Offline JWT license validation. ES256 only; private key never
  # ships with the SDK. See lib/src/license/license_validator.dart.
  dart_jsonwebtoken: ^3.4.1
  # Runtime audience detection — reads the application id / bundle
  # identifier as the license `aud` binding.
  package_info_plus: ^10.1.0
  # Documents-directory discovery for `dvai-license.jwt`.
  path_provider: ^2.1.5
  # pointycastle is a transitive dep of dart_jsonwebtoken — pinned
  # explicitly so the test suite can use ECKeyGenerator directly to
  # mint a deterministic keypair for license-validator tests.
  pointycastle: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"
  pigeon: ^26.3.4
  mockito: ^5.4.5
  build_runner: ^2.4.13

flutter:
  plugin:
    platforms:
      android:
        package: co.deepvoiceai.bridge.flutter
        pluginClass: DVAIBridgeFlutterPlugin
      ios:
        pluginClass: DVAIBridgeFlutterPlugin
