// LiteRT core module — wraps Google's LiteRT (TFLite successor) runtime for
// generic .tflite / .litertlm Llama-style stateful checkpoints. Distinct
// from android-mediapipe-core, which uses the bundled `litertlm-android`
// MediaPipe-shaped artifact: this module pulls litert + litert-llm
// directly so consumers running their own LiteRT graphs (without
// MediaPipe's bundled-task wrappers) have a clean dependency surface.

buildscript {
    ext {
        kotlinVersion = '2.3.21'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

ext {
    junitVersion = '4.13.2'
    androidxAppCompatVersion = '1.7.1'
    coroutinesVersion = '1.10.2'
    // Pinned within Ktor 2.x to match the rest of the Android cores.
    ktorVersion = '2.3.13'
    // LiteRT runtime — Google's TFLite-successor.
    // litert: core Interpreter + delegate APIs.
    // litert-llm: LLM-specific helpers (KV-cache, sampler, tokenizer adapters).
    // Verify latest stable on Maven Central before bumping; coordinated
    // with HuggingFace tokenizers-android which speaks the same .json format.
    litertVersion = '1.4.0'
    // HuggingFace tokenizers (JNI) for tokenizer.json parsing. JitPack
    // distribution; consumers add `maven { url 'https://jitpack.io' }` to
    // their settings.gradle.kts repos block (documented in the consumer
    // guide produced by Phase 3D Task 18).
    huggingfaceTokenizersVersion = '0.21.4'
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // Phase 3D: shared-core lives in mavenLocal during dev, GitHub
        // Packages in production.
        mavenLocal()
        // JitPack — required for `com.github.huggingface:tokenizers-android`.
        maven { url = uri('https://jitpack.io') }
    }
}

apply plugin: 'com.android.library'
apply plugin: 'maven-publish'

android {
    namespace 'co.deepvoiceai.bridge.litert.core'
    compileSdk 36

    defaultConfig {
        minSdk 24
        targetSdk 36
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

// AGP 9 / Kotlin 2.x: legacy android.kotlinOptions is gone; use the
// standalone `kotlin { compilerOptions { ... } }` extension.
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    // Phase 3D: shared HTTP server + handler dispatch types.
    implementation 'co.deepvoiceai:android-shared-core:2.0.0'

    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "io.ktor:ktor-server-core:$ktorVersion"
    implementation "io.ktor:ktor-server-cio:$ktorVersion"
    implementation "io.ktor:ktor-server-cors:$ktorVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$coroutinesVersion"
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.11.0'
    implementation 'com.squareup.okhttp3:okhttp:5.3.2'

    // LiteRT runtime + HuggingFace tokenizer get added by Phase 3D Task 6
    // (LiteRTEngine implementation). The artifact coordinates declared in
    // the `ext { }` block above (litertVersion, huggingfaceTokenizersVersion)
    // are the working defaults; the Task 6 implementer verifies the
    // current Maven Central / JitPack coordinates against upstream docs at
    // implementation time and uncomments the lines below.
    //
    // implementation "com.google.ai.edge.litert:litert:$litertVersion"
    // implementation "com.google.ai.edge.litert:litert-llm:$litertVersion"
    // implementation "com.github.huggingface:tokenizers-android:$huggingfaceTokenizersVersion"

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$coroutinesVersion"
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation "io.ktor:ktor-server-test-host:$ktorVersion"
    testImplementation 'com.squareup.okhttp3:mockwebserver:5.3.2'

    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
}

// Phase 3D Task 4: copy-paste publishing block (see llama-core for the
// rationale on why each Gradle root has its own copy).
afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                groupId = 'co.deepvoiceai'
                artifactId = 'android-litert-core'
                version = (project.findProperty('dvaiBridgeVersion') ?: '2.0.0').toString()
                from components.release
            }
        }
        repositories {
            maven {
                name = 'GitHubPackages'
                url = uri('https://maven.pkg.github.com/Westenets/dvai-bridge')
                credentials {
                    username = project.findProperty('gpr.user') ?: System.getenv('GITHUB_ACTOR')
                    password = project.findProperty('gpr.key') ?: System.getenv('GITHUB_TOKEN')
                }
            }
        }
    }
}
