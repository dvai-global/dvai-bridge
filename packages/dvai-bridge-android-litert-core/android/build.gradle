// LiteRT core module — wraps Google's LiteRT (TFLite successor) runtime for
// generic .tflite / .litertlm Llama-style stateful checkpoints. Distinct
// from android-mediapipe-core, which uses the bundled `litertlm-android`
// MediaPipe-shaped artifact: this module pulls bare `litert` directly so
// consumers running their own LiteRT graphs (without MediaPipe's
// bundled-task wrappers) have a clean dependency surface.
//
// Phase 3D Task 6 artifact verification (Apr 27 2026):
//
//   1. `com.google.ai.edge.litert:litert:2.1.4` — latest stable on Google's
//      Maven (https://dl.google.com/android/maven2). The 2.x line is the
//      Kotlin `CompiledModel` API; the 1.x sibling artifacts (`litert-api`,
//      `litert-gpu`, `litert-support`) are NOT pulled here because the 2.x
//      AAR carries the JNI runtime itself. Source:
//      https://mvnrepository.com/artifact/com.google.ai.edge.litert/litert
//
//   2. `litert-llm` does NOT exist as a standalone Maven artifact. The plan's
//      original guess (`com.google.ai.edge.litert:litert-llm:<version>`)
//      404s on Google's Maven. Google's LLM-specific layer is shipped as
//      `com.google.ai.edge.litertlm:litertlm-android` — but that's the
//      bundled-tasks wrapper this module deliberately avoids (mediapipe-core
//      already uses 0.10.2). We instead drive token-by-token decoding on
//      bare `CompiledModel`, which a Llama-style stateful .tflite checkpoint
//      exposes via named tensors (`input_ids`, `causal_mask`, `logits`).
//
//   3. HuggingFace tokenizers — there is NO clean Android-native artifact:
//        - `com.github.huggingface:tokenizers-android` (the plan's guess)
//          returns 401 from JitPack — the artifact does not exist.
//        - `ai.djl.huggingface:tokenizers:0.36.0` (Maven Central) is a JVM
//          jar that JNI-loads `libtokenizers.so`. DJL only publishes that
//          .so for x86_64 + aarch64 GNU Linux + macOS + Windows; there are
//          no Android (`*-linux-android`) binaries — pulling DJL would
//          UnsatisfiedLinkError at first encode().
//        - HF's official Rust crate has no Android JNI wrapper on Maven.
//      Decision: ship a pure-Kotlin tokenizer.json BPE parser (see
//      `Internal/HFTokenizerJson.kt`). Uses kotlinx-serialization-json
//      (already on the classpath) to parse the standard tokenizer.json
//      shape: `model.vocab` + `model.merges` + `added_tokens`. Tradeoff:
//      no Jinja chat-template engine — callers stringify messages via a
//      simple Llama-3-style formatter at the handler layer.

buildscript {
    ext {
        kotlinVersion = '2.3.21'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

ext {
    junitVersion = '4.13.2'
    androidxAppCompatVersion = '1.7.1'
    coroutinesVersion = '1.10.2'
    // Pinned within Ktor 2.x to match the rest of the Android cores.
    ktorVersion = '2.3.13'
    // LiteRT runtime — Google's TFLite-successor. 2.1.4 is latest stable on
    // Google's Maven (verified Apr 27 2026 against
    // https://dl.google.com/android/maven2/com/google/ai/edge/litert/litert/maven-metadata.xml).
    // The 2.x AAR uses the new Kotlin CompiledModel API; no separate
    // `litert-api` / `litert-llm` artifacts are needed.
    litertVersion = '2.1.4'
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // Phase 3D: shared-core lives in mavenLocal during dev, GitHub
        // Packages in production.
        mavenLocal()
        // NOTE: JitPack is intentionally NOT in the repo list — the plan's
        // original `com.github.huggingface:tokenizers-android` JitPack guess
        // does not exist. We ship a pure-Kotlin tokenizer.json BPE parser
        // instead (see top-of-file comment, item 3).
    }
}

// AGP 9+ ships built-in Kotlin support; the standalone 'kotlin-android'
// plugin is no longer needed (matches mediapipe-core / llama-core). The
// kotlinx-serialization-json runtime jar pulled below is used purely for
// JsonObject/buildJsonObject DSL — no @Serializable classes — so the
// kotlinx-serialization Gradle plugin is also unnecessary.
apply plugin: 'com.android.library'
apply plugin: 'maven-publish'

android {
    namespace 'co.deepvoiceai.bridge.litert.core'
    compileSdk 36

    defaultConfig {
        minSdk 24
        targetSdk 36
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    testOptions {
        unitTests.includeAndroidResources = true
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

// AGP 9 / Kotlin 2.x: legacy android.kotlinOptions is gone; use the
// standalone `kotlin { compilerOptions { ... } }` extension.
kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {
    // Phase 3D: shared HTTP server + handler dispatch types. `api` so
    // consumers (umbrella + downstream apps) see them transitively.
    api "co.deepvoiceai:android-shared-core:$dvaiBridgeVersion"

    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "io.ktor:ktor-server-core:$ktorVersion"
    implementation "io.ktor:ktor-server-cio:$ktorVersion"
    implementation "io.ktor:ktor-server-cors:$ktorVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$coroutinesVersion"
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.11.0'
    implementation 'com.squareup.okhttp3:okhttp:5.3.2'

    // LiteRT 2.x runtime. The AAR bundles the native libtensorflowlite_jni.so
    // for arm64-v8a + armeabi-v7a + x86 + x86_64.
    implementation "com.google.ai.edge.litert:litert:$litertVersion"
    // No `litert-llm` artifact — see top-of-file comment, item 2.
    // No HF tokenizers JNI artifact — see top-of-file comment, item 3.

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$coroutinesVersion"
    testImplementation 'org.robolectric:robolectric:4.16.1'
    testImplementation "io.ktor:ktor-server-test-host:$ktorVersion"
    testImplementation 'com.squareup.okhttp3:mockwebserver:5.3.2'

    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit:1.3.0'
}

// Phase 3D Task 4: copy-paste publishing block (see llama-core for the
// rationale on why each Gradle root has its own copy).
afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                groupId = 'co.deepvoiceai'
                artifactId = 'android-litert-core'
                version = (project.findProperty('dvaiBridgeVersion') ?: '2.4.0').toString()
                from components.release
            }
        }
        repositories {
            maven {
                name = 'GitHubPackages'
                url = uri('https://maven.pkg.github.com/Westenets/dvai-bridge')
                credentials {
                    username = project.findProperty('gpr.user') ?: System.getenv('GITHUB_ACTOR')
                    password = project.findProperty('gpr.key') ?: System.getenv('GITHUB_TOKEN')
                }
            }
        }
    }
}
