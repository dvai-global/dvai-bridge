name: flutter_app
description: "DVAI-Bridge Flutter example with backend dropdown."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5
  flutter: '>=3.39.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Workspace path-dep — the Flutter plugin lives in
  # `packages/dvai-bridge-flutter/` at the monorepo root.
  dvai_bridge:
    path: ../../packages/dvai-bridge-flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
