<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280" />
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED" />
    </marker>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 11px; fill: #6B7280; font-style: italic; }
      .layer-label { font-size: 10px; font-weight: 700; fill: #6B7280; letter-spacing: 0.8px; }
      .box-title { font-size: 13px; font-weight: 700; fill: #111827; }
      .box-sub { font-size: 10.5px; fill: #374151; }
      .badge { font-size: 9.5px; font-weight: 600; fill: #ffffff; }
      .v3-tag { font-size: 9.5px; font-weight: 700; fill: #7C3AED; letter-spacing: 0.5px; }
    </style>
  </defs>

  <text x="490" y="28" class="title" text-anchor="middle">Figure 1 — DVAI-BRIDGE Layered Architecture (v3.0)</text>
  <text x="490" y="46" class="subtitle" text-anchor="middle">Three layers, three gaps closed: shipping friction · language fragmentation · single-device assumption</text>

  <!-- ========================================================== -->
  <!-- LAYER 0: CONSUMER / AGENT CODE                              -->
  <!-- ========================================================== -->
  <text x="40" y="80" class="layer-label">CONSUMER LAYER (UNCHANGED)</text>
  <rect x="40" y="90" width="900" height="58" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5" />
  <text x="60" y="113" class="box-title">Application code · Agent SDKs · OpenAI clients</text>
  <text x="60" y="131" class="box-sub">LangChain · Vercel AI SDK · Microsoft Semantic Kernel · CrewAI · LlamaIndex · OpenAI SDKs (JS / Swift / Kotlin / Dart / C# / Python)</text>
  <text x="60" y="146" class="box-sub" font-style="italic">Points baseURL → dvai.baseUrl  (or platform-equivalent return value)</text>

  <line x1="490" y1="148" x2="490" y2="172" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- ========================================================== -->
  <!-- LAYER 1: SDK FAMILY                                         -->
  <!-- ========================================================== -->
  <text x="40" y="186" class="layer-label">SDK FAMILY · 7 LANGUAGES, ONE CONTRACT</text>
  <rect x="40" y="196" width="900" height="58" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5" />
  <g font-size="10.5" fill="#166534" font-weight="600">
    <rect x="55"  y="212" width="100" height="28" rx="4" fill="#22C55E" />
    <text x="105" y="231" text-anchor="middle" class="badge">Web (JS/TS)</text>
    <rect x="170" y="212" width="100" height="28" rx="4" fill="#22C55E" />
    <text x="220" y="231" text-anchor="middle" class="badge">Capacitor</text>
    <rect x="285" y="212" width="100" height="28" rx="4" fill="#22C55E" />
    <text x="335" y="231" text-anchor="middle" class="badge">iOS native</text>
    <rect x="400" y="212" width="120" height="28" rx="4" fill="#22C55E" />
    <text x="460" y="231" text-anchor="middle" class="badge">Android native</text>
    <rect x="535" y="212" width="120" height="28" rx="4" fill="#22C55E" />
    <text x="595" y="231" text-anchor="middle" class="badge">React Native</text>
    <rect x="670" y="212" width="100" height="28" rx="4" fill="#22C55E" />
    <text x="720" y="231" text-anchor="middle" class="badge">Flutter</text>
    <rect x="785" y="212" width="140" height="28" rx="4" fill="#22C55E" />
    <text x="855" y="231" text-anchor="middle" class="badge">.NET (MAUI/Desktop)</text>
  </g>

  <line x1="490" y1="254" x2="490" y2="278" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- ========================================================== -->
  <!-- LAYER 2: OPENAI HTTP SHIM                                   -->
  <!-- ========================================================== -->
  <text x="40" y="292" class="layer-label">OPENAI HTTP SHIM · GAP 2 RESPONSE</text>
  <rect x="40" y="302" width="900" height="86" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5" />
  <text x="60" y="324" class="box-title">Same handler logic; two transports</text>
  <text x="60" y="344" class="box-sub">/v1/chat/completions · /v1/completions · /v1/embeddings · /v1/models · /v1/dvai/* (v3.0+)</text>
  <g font-size="10.5">
    <rect x="60"  y="354" width="270" height="22" rx="4" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1" />
    <text x="195" y="370" text-anchor="middle" fill="#1E40AF" font-weight="700">MSW (Service Worker) — browser</text>
    <rect x="345" y="354" width="270" height="22" rx="4" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1" />
    <text x="480" y="370" text-anchor="middle" fill="#1E40AF" font-weight="700">HTTP loopback (127.0.0.1) — native</text>
    <rect x="630" y="354" width="290" height="22" rx="4" fill="#E9D5FF" stroke="#7C3AED" stroke-width="1" />
    <text x="775" y="370" text-anchor="middle" fill="#581C87" font-weight="700">+ /v1/dvai/* (capability · peers · pair-qr)  v3.0+</text>
  </g>

  <line x1="490" y1="388" x2="490" y2="412" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- ========================================================== -->
  <!-- LAYER 3: ORCHESTRATION + OFFLOAD                            -->
  <!-- ========================================================== -->
  <text x="40" y="426" class="layer-label">ORCHESTRATION · OFFLOAD DECISION (v3.0+)</text>
  <rect x="40" y="436" width="900" height="62" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" />
  <text x="60" y="458" class="box-title">DVAI core · resolveBackend() · auto-recovery · createPipeline · OFFLOAD DECISION</text>
  <text x="60" y="476" class="box-sub">decide(config, model, localCapability, peers, header) → { local | offload(peer) | no_capable_device }</text>
  <text x="60" y="491" class="box-sub" font-style="italic">When offload disabled: behaves like v2.x exactly. When enabled: per-request routing decision.</text>

  <line x1="490" y1="498" x2="490" y2="522" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- ========================================================== -->
  <!-- LAYER 4: BACKEND MATRIX                                     -->
  <!-- ========================================================== -->
  <text x="40" y="536" class="layer-label">BACKEND MATRIX · 9 ENGINES · GAP 1 RESPONSE</text>
  <rect x="40" y="546" width="900" height="76" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" />
  <g font-size="10" fill="#78350F" font-weight="600">
    <rect x="55"  y="560" width="98" height="22" rx="3" fill="#FBBF24" />
    <text x="104" y="575" text-anchor="middle">WebLLM</text>
    <rect x="160" y="560" width="98" height="22" rx="3" fill="#FBBF24" />
    <text x="209" y="575" text-anchor="middle">Transformers.js</text>
    <rect x="265" y="560" width="98" height="22" rx="3" fill="#FBBF24" />
    <text x="314" y="575" text-anchor="middle">llama.cpp</text>
    <rect x="370" y="560" width="98" height="22" rx="3" fill="#FBBF24" />
    <text x="419" y="575" text-anchor="middle">CoreML</text>
    <rect x="475" y="560" width="98" height="22" rx="3" fill="#FBBF24" />
    <text x="524" y="575" text-anchor="middle">Foundation</text>
    <rect x="580" y="560" width="98" height="22" rx="3" fill="#FBBF24" />
    <text x="629" y="575" text-anchor="middle">MLX</text>
    <rect x="685" y="560" width="98" height="22" rx="3" fill="#FBBF24" />
    <text x="734" y="575" text-anchor="middle">MediaPipe</text>
    <rect x="790" y="560" width="98" height="22" rx="3" fill="#FBBF24" />
    <text x="839" y="575" text-anchor="middle">LiteRT</text>

    <rect x="160" y="588" width="98" height="22" rx="3" fill="#F59E0B" />
    <text x="209" y="603" text-anchor="middle" fill="#ffffff">ONNX-GenAI</text>
    <rect x="265" y="588" width="98" height="22" rx="3" fill="#F59E0B" />
    <text x="314" y="603" text-anchor="middle" fill="#ffffff">ML.NET</text>
    <text x="380" y="606" fill="#78350F" font-style="italic">.NET-only paths →</text>
  </g>

  <!-- ========================================================== -->
  <!-- LAYER 5 (OVERLAY): DISTRIBUTED INFERENCE PLANE              -->
  <!-- ========================================================== -->
  <text x="40" y="644" class="v3-tag">DISTRIBUTED-INFERENCE PLANE (v3.0+) · GAP 3 RESPONSE · OPT-IN</text>
  <rect x="40" y="654" width="900" height="50" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6 3" />
  <text x="60" y="676" class="box-title" fill="#581C87">Capability probe · LAN mDNS discovery · QR-pair via self-hosted rendezvous · HMAC handshake</text>
  <text x="60" y="693" class="box-sub" fill="#374151">When enabled: weak device routes to stronger peer the user owns. Transparent to consumer code. See Figure 7 for the rendezvous-pairing flow.</text>

  <!-- v3 plane wraps around lower layers -->
  <line x1="40"  y1="654" x2="40"  y2="546" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="940" y1="654" x2="940" y2="546" stroke="#7C3AED" stroke-width="1" stroke-dasharray="4 3" />
</svg>
