    Filled = #22aa55 (supported); empty = #E5E7EB (unsupported).
    Coordinate generator: x = 170 + col*56 + 2 ; y = 116 + row*38 + 2  (i.e. cell origin 172, 118)
  -->

  <!-- Row 0: Web — WebLLM(1), Trans(1), rest 0 -->
  <rect x="172" y="118" width="52" height="34" rx="4" fill="#22aa55"/>
  <rect x="228" y="118" width="52" height="34" rx="4" fill="#22aa55"/>
  <rect x="284" y="118" width="52" height="34" rx="4" fill="#E5E7EB"/>
