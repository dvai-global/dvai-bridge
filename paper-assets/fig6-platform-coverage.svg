  <!-- Footnote -->
  <text x="450" y="468" class="note" text-anchor="middle">React Native + Flutter delegate iOS / Android backends to the underlying native SDKs.</text>
  <text x="450" y="482" class="note" text-anchor="middle">.NET (mobile) covers iOS / Android / Mac Catalyst via .NET MAUI; .NET (desktop) covers Windows / macOS / Linux.</text>

  <!-- Caption -->
  <text x="450" y="520" class="caption" text-anchor="middle">Six SDKs × nine inference backends, all behind a single OpenAI-compatible HTTP contract.</text>
