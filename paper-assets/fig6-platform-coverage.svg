  <rect x="200" y="430" width="18" height="14" rx="3" fill="#22aa55"/>
  <text x="225" y="442" class="legend-text">supported</text>
  <rect x="320" y="430" width="18" height="14" rx="3" fill="#E5E7EB"/>
