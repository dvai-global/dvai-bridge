<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #111827; }
      .axis-label { font-size: 11px; font-weight: 700; fill: #6B7280; letter-spacing: 0.6px; }
      .row-label { font-size: 12px; font-weight: 600; fill: #111827; }
      .col-label { font-size: 11px; font-weight: 600; fill: #111827; }
      .legend-text { font-size: 11px; fill: #374151; }
      .caption { font-size: 11px; fill: #4B5563; }
      .note { font-size: 10px; fill: #6B7280; font-style: italic; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="title" text-anchor="middle">Figure 6 — Platform × Backend Coverage (v2.4.0)</text>

  <!-- Axis labels -->
  <text x="160" y="62" class="axis-label">SDK \ BACKEND</text>
  <text x="450" y="495" class="axis-label" text-anchor="middle">BACKEND</text>

  <!-- Y-axis "SDK" rotated label -->
  <text x="22" y="245" class="axis-label" text-anchor="middle" transform="rotate(-90 22 245)">SDK</text>

  <!--
    Grid geometry:
      - 7 SDK rows (Web, iOS, Android, RN, Flutter, .NET-mobile, .NET-desktop)
      - 10 Backend columns (WebLLM, Trans, Llama, CoreML, Found, MLX, MediaPipe, LiteRT, ONNX, MLNet)
      - Cell width 56, height 38
      - Grid origin (top-left of first cell): x=170, y=110
  -->

  <!-- Column headers (rotated -45°) -->
  <g class="col-label">
    <text x="198" y="105" text-anchor="end" transform="rotate(-45 198 105)">WebLLM</text>
    <text x="254" y="105" text-anchor="end" transform="rotate(-45 254 105)">Transformers</text>
    <text x="310" y="105" text-anchor="end" transform="rotate(-45 310 105)">Llama</text>
    <text x="366" y="105" text-anchor="end" transform="rotate(-45 366 105)">CoreML</text>
    <text x="422" y="105" text-anchor="end" transform="rotate(-45 422 105)">Foundation</text>
    <text x="478" y="105" text-anchor="end" transform="rotate(-45 478 105)">MLX</text>
    <text x="534" y="105" text-anchor="end" transform="rotate(-45 534 105)">MediaPipe</text>
    <text x="590" y="105" text-anchor="end" transform="rotate(-45 590 105)">LiteRT</text>
    <text x="646" y="105" text-anchor="end" transform="rotate(-45 646 105)">ONNX</text>
    <text x="702" y="105" text-anchor="end" transform="rotate(-45 702 105)">ML.NET</text>
  </g>

  <!-- Row labels -->
  <g class="row-label">
    <text x="165" y="135" text-anchor="end">Web</text>
    <text x="165" y="173" text-anchor="end">iOS native</text>
    <text x="165" y="211" text-anchor="end">Android native</text>
    <text x="165" y="249" text-anchor="end">React Native</text>
    <text x="165" y="287" text-anchor="end">Flutter</text>
    <text x="165" y="325" text-anchor="end">.NET (mobile)</text>
    <text x="165" y="363" text-anchor="end">.NET (desktop)</text>
  </g>

