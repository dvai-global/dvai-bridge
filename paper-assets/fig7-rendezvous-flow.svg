<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
    </marker>
    <marker id="arrEnc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E" />
    </marker>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 11px; fill: #6B7280; font-style: italic; }
      .lane-title { font-size: 12px; font-weight: 700; fill: #ffffff; letter-spacing: 0.4px; }
      .step-num { font-size: 11px; font-weight: 700; fill: #ffffff; }
      .step-text { font-size: 10.5px; fill: #111827; }
      .step-detail { font-size: 9.5px; fill: #6B7280; font-style: italic; }
      .phase-label { font-size: 11px; font-weight: 700; fill: #6B7280; letter-spacing: 0.6px; }
      .enc-label { font-size: 10px; font-weight: 700; fill: #15803D; }
    </style>
  </defs>

  <text x="550" y="28" class="title" text-anchor="middle">Figure 7 — Rendezvous-Mediated Device Pairing (v3.0+)</text>
  <text x="550" y="46" class="subtitle" text-anchor="middle">QR-scan handshake → X25519 key exchange → AEAD-encrypted relay. Server is stateless and never sees plaintext inference data.</text>

  <!-- Three actor lanes -->
  <g>
    <rect x="100" y="68" width="220" height="38" rx="4" fill="#3B82F6" />
    <text x="210" y="92" class="lane-title" text-anchor="middle">Source device (weak)</text>

    <rect x="440" y="68" width="220" height="38" rx="4" fill="#7C3AED" />
    <text x="550" y="92" class="lane-title" text-anchor="middle">Rendezvous server (your host)</text>

    <rect x="780" y="68" width="220" height="38" rx="4" fill="#22C55E" />
    <text x="890" y="92" class="lane-title" text-anchor="middle">Target device (strong)</text>
  </g>

  <!-- Lifelines -->
  <line x1="210" y1="106" x2="210" y2="744" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="550" y1="106" x2="550" y2="744" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="890" y1="106" x2="890" y2="744" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" />

  <!-- ============================ -->
  <!-- PHASE 1: PAIR-SOURCE         -->
  <!-- ============================ -->
  <text x="40" y="130" class="phase-label">PHASE 1 · SESSION CREATION</text>
  <line x1="40" y1="135" x2="1060" y2="135" stroke="#E5E7EB" stroke-width="1" />

  <circle cx="60" cy="158" r="10" fill="#3B82F6" />
  <text x="60" y="162" class="step-num" text-anchor="middle">1</text>
  <text x="80" y="155" class="step-text">Source generates ephemeral X25519 keypair</text>
  <text x="80" y="170" class="step-detail">stays local; only public key leaves the device</text>

  <line x1="210" y1="190" x2="545" y2="190" stroke="#374151" stroke-width="1.5" marker-end="url(#arr7)" />
  <text x="378" y="184" class="step-text" text-anchor="middle">WS /pair · {type: "pair-source", deviceId, deviceName, capability, ephemeralPubKey}</text>

  <circle cx="60" cy="220" r="10" fill="#7C3AED" />
  <text x="60" y="224" class="step-num" text-anchor="middle">2</text>
  <text x="80" y="217" class="step-text">Server creates session, stores source connection</text>
  <text x="80" y="232" class="step-detail">in-memory only; no DB; TTL = 60s</text>

  <line x1="545" y1="252" x2="215" y2="252" stroke="#374151" stroke-width="1.5" marker-end="url(#arr7)" />
  <text x="378" y="246" class="step-text" text-anchor="middle">{type: "session-created", sessionId, qrPayload, expiresAt}</text>

  <!-- ============================ -->
  <!-- PHASE 2: QR DISPLAY + SCAN  -->
  <!-- ============================ -->
  <text x="40" y="285" class="phase-label">PHASE 2 · QR-CODE DISPLAY + SCAN</text>
  <line x1="40" y1="290" x2="1060" y2="290" stroke="#E5E7EB" stroke-width="1" />

  <circle cx="60" cy="313" r="10" fill="#3B82F6" />
  <text x="60" y="317" class="step-num" text-anchor="middle">3</text>
  <text x="80" y="310" class="step-text">Source displays QR (via host app's UI)</text>
  <text x="80" y="325" class="step-detail">qrPayload = base64url({rendezvousUrl, sessionId, sourcePubKey, ...})</text>

  <!-- Out-of-band QR scan arrow -->
  <path d="M 215 350 Q 550 410 885 350" stroke="#10B981" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrEnc)" />
  <text x="550" y="395" class="enc-label" text-anchor="middle">Out-of-band: target scans QR with camera (host app's job)</text>
  <text x="550" y="410" class="step-detail" text-anchor="middle">no network traffic involved · physical co-location proves user-trust</text>

  <!-- ============================ -->
  <!-- PHASE 3: PAIR-TARGET         -->
  <!-- ============================ -->
  <text x="40" y="450" class="phase-label">PHASE 3 · TARGET JOINS · KEY EXCHANGE</text>
  <line x1="40" y1="455" x2="1060" y2="455" stroke="#E5E7EB" stroke-width="1" />

  <circle cx="60" cy="478" r="10" fill="#22C55E" />
  <text x="60" y="482" class="step-num" text-anchor="middle">4</text>
  <text x="80" y="475" class="step-text">Target generates its OWN ephemeral X25519 keypair</text>
  <text x="80" y="490" class="step-detail">decoded sourcePubKey from QR; computes shared secret = X25519(targetSecret, sourcePub)</text>

  <line x1="885" y1="510" x2="555" y2="510" stroke="#374151" stroke-width="1.5" marker-end="url(#arr7)" />
  <text x="720" y="504" class="step-text" text-anchor="middle">WS /pair · {type: "pair-target", sessionId, deviceId, ephemeralPubKey}</text>

  <circle cx="60" cy="540" r="10" fill="#7C3AED" />
  <text x="60" y="544" class="step-num" text-anchor="middle">5</text>
  <text x="80" y="537" class="step-text">Server matches sessionId, relays public keys both ways</text>
  <text x="80" y="552" class="step-detail">server learns no secret material — just two opaque base64-url strings</text>

  <line x1="545" y1="572" x2="215" y2="572" stroke="#374151" stroke-width="1.5" marker-end="url(#arr7)" />
  <text x="378" y="566" class="step-text" text-anchor="middle">{type: "peer-connected", peerEphemeralPubKey, peerDeviceId, peerCapability}</text>

  <line x1="555" y1="600" x2="885" y2="600" stroke="#374151" stroke-width="1.5" marker-end="url(#arr7)" />
  <text x="720" y="594" class="step-text" text-anchor="middle">{type: "peer-connected", ...} (mirror to target)</text>

  <circle cx="60" cy="628" r="10" fill="#3B82F6" />
  <text x="60" y="632" class="step-num" text-anchor="middle">6</text>
  <text x="80" y="625" class="step-text">Source computes shared secret = X25519(sourceSecret, targetPub)</text>
  <text x="80" y="640" class="step-detail">both sides now hold IDENTICAL 256-bit secret · server cannot derive it</text>

  <!-- ============================ -->
  <!-- PHASE 4: ENCRYPTED RELAY     -->
  <!-- ============================ -->
  <text x="40" y="675" class="phase-label">PHASE 4 · ENCRYPTED RELAY (steady state)</text>
  <line x1="40" y1="680" x2="1060" y2="680" stroke="#E5E7EB" stroke-width="1" />

  <line x1="210" y1="703" x2="545" y2="703" stroke="#15803D" stroke-width="1.5" marker-end="url(#arrEnc)" />
  <text x="378" y="697" class="enc-label" text-anchor="middle">{type: "relay", sessionId, payload: AEAD(secret, openai-request)}</text>

  <line x1="555" y1="703" x2="885" y2="703" stroke="#15803D" stroke-width="1.5" marker-end="url(#arrEnc)" />
  <text x="720" y="697" class="enc-label" text-anchor="middle">→ relayed verbatim · server sees ciphertext only</text>

  <line x1="885" y1="730" x2="555" y2="730" stroke="#15803D" stroke-width="1.5" marker-end="url(#arrEnc)" />
  <text x="720" y="724" class="enc-label" text-anchor="middle">{type: "relay", payload: AEAD(secret, sse-chunk)}</text>

  <line x1="545" y1="730" x2="215" y2="730" stroke="#15803D" stroke-width="1.5" marker-end="url(#arrEnc)" />
  <text x="378" y="724" class="enc-label" text-anchor="middle">→ relayed; source decrypts, re-emits as SSE locally</text>

  <!-- Footer notes -->
  <rect x="40" y="760" width="1020" height="48" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1" />
  <text x="60" y="780" class="step-text" font-weight="700" fill="#15803D">Privacy property:</text>
  <text x="60" y="796" class="step-text">A compromised rendezvous server leaks pairing metadata (which devices paired with which, when) but cannot read prompts or responses. The shared secret is forward-secret per pairing — re-pair = fresh secret.</text>
</svg>
