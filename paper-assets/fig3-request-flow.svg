<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
    </marker>
    <marker id="arrV3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED" />
    </marker>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 11px; fill: #6B7280; font-style: italic; }
      .lane-title { font-size: 12px; font-weight: 700; fill: #ffffff; letter-spacing: 0.4px; }
      .step-box { fill: #ffffff; stroke: #6B7280; stroke-width: 1; }
      .step-text { font-size: 11px; fill: #111827; }
      .step-strong { font-size: 11px; font-weight: 700; fill: #111827; }
      .branch-label { font-size: 10px; fill: #6B7280; font-style: italic; }
      .v3 { fill: #7C3AED; }
    </style>
  </defs>

  <text x="550" y="28" class="title" text-anchor="middle">Figure 3 — Request-Flow Sequence (browser MSW + native HTTP + v3 offload branch)</text>
  <text x="550" y="46" class="subtitle" text-anchor="middle">Same handler logic, two transports; offload decision branches off when v3 distributed inference is enabled</text>

  <!-- Three swim lanes -->
  <rect x="40"  y="68" width="160" height="38" rx="4" fill="#1E3A8A" />
  <text x="120" y="92" class="lane-title" text-anchor="middle">Consumer code</text>

  <rect x="220" y="68" width="180" height="38" rx="4" fill="#3B82F6" />
  <text x="310" y="92" class="lane-title" text-anchor="middle">OpenAI client SDK</text>

  <rect x="420" y="68" width="200" height="38" rx="4" fill="#06B6D4" />
  <text x="520" y="92" class="lane-title" text-anchor="middle">Transport (MSW or HTTP)</text>

  <rect x="640" y="68" width="200" height="38" rx="4" fill="#22C55E" />
  <text x="740" y="92" class="lane-title" text-anchor="middle">DVAI handler + decide()</text>

  <rect x="860" y="68" width="200" height="38" rx="4" fill="#F59E0B" />
  <text x="960" y="92" class="lane-title" text-anchor="middle">Backend / peer</text>

  <!-- Vertical lifelines -->
  <line x1="120" y1="106" x2="120" y2="660" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="310" y1="106" x2="310" y2="660" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="520" y1="106" x2="520" y2="660" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="740" y1="106" x2="740" y2="660" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" />
  <line x1="960" y1="106" x2="960" y2="660" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" />

  <!-- Step 1: consumer → SDK -->
  <text x="120" y="135" class="step-strong" text-anchor="middle">openai.chat.</text>
  <text x="120" y="148" class="step-strong" text-anchor="middle">completions.create()</text>
  <line x1="120" y1="160" x2="305" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)" />

  <!-- Step 2: SDK → transport -->
  <text x="215" y="180" class="step-text" text-anchor="middle">fetch(baseURL + /v1/chat/completions)</text>
  <line x1="310" y1="195" x2="515" y2="195" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)" />

  <!-- Transport branch label -->
  <rect x="425" y="208" width="200" height="38" rx="4" class="step-box" />
  <text x="525" y="225" class="step-strong" text-anchor="middle">Browser? → MSW intercept</text>
  <text x="525" y="240" class="branch-label" text-anchor="middle">Native? → HTTP server (127.0.0.1)</text>

  <!-- Step 3: transport → handler -->
  <line x1="520" y1="250" x2="735" y2="250" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)" />
  <text x="625" y="245" class="step-text" text-anchor="middle">request body</text>

  <!-- Handler box -->
  <rect x="650" y="262" width="180" height="38" rx="4" class="step-box" />
  <text x="740" y="279" class="step-strong" text-anchor="middle">Parse body · pick handler</text>
  <text x="740" y="294" class="branch-label" text-anchor="middle">stream vs non-stream</text>

  <!-- v3 BRANCH: decide() -->
  <rect x="650" y="316" width="180" height="58" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 3" />
  <text x="740" y="334" class="step-strong v3" text-anchor="middle">if offload.enabled:</text>
  <text x="740" y="350" class="step-strong v3" text-anchor="middle">decide() → local | offload | error</text>
  <text x="740" y="367" class="branch-label v3" text-anchor="middle">v3.0+ — see Figure 7 for pairing</text>

  <!-- Branch 1: local backend -->
  <line x1="740" y1="376" x2="740" y2="404" stroke="#374151" stroke-width="1.5" />
  <line x1="740" y1="404" x2="955" y2="404" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)" />
  <text x="850" y="398" class="step-text" text-anchor="middle">[local] backend.chatCompletion()</text>

  <rect x="870" y="416" width="180" height="34" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" />
  <text x="960" y="438" class="step-strong" text-anchor="middle">Local backend runs</text>

  <!-- Branch 2: offload to peer -->
  <line x1="740" y1="376" x2="740" y2="466" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 3" />
  <line x1="740" y1="466" x2="955" y2="466" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrV3)" />
  <text x="850" y="460" class="step-text v3" text-anchor="middle">[offload] proxy via fetch / WS</text>

  <rect x="870" y="478" width="180" height="34" rx="4" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1" />
  <text x="960" y="500" class="step-strong v3" text-anchor="middle">Peer device runs</text>

  <!-- Branch 3: no_capable_device error -->
  <rect x="650" y="478" width="180" height="34" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" />
  <text x="740" y="500" class="step-strong" text-anchor="middle" fill="#991B1B">[error] 503 no_capable_device</text>

  <!-- Streaming response back -->
  <line x1="955" y1="540" x2="525" y2="540" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)" />
  <text x="740" y="535" class="step-text" text-anchor="middle">SSE chunks: data: {choices:[{delta:{content:...}}]}</text>

  <line x1="520" y1="572" x2="315" y2="572" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)" />
  <text x="420" y="567" class="step-text" text-anchor="middle">streamed response</text>

  <line x1="310" y1="600" x2="125" y2="600" stroke="#374151" stroke-width="1.5" marker-end="url(#arr3)" />
  <text x="215" y="595" class="step-text" text-anchor="middle">async iterator yields tokens</text>

  <text x="120" y="630" class="step-strong" text-anchor="middle">Consumer renders</text>
  <text x="120" y="645" class="step-strong" text-anchor="middle">streamed text</text>

  <!-- Footer note -->
  <rect x="40" y="690" width="1020" height="48" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1" />
  <text x="60" y="710" class="step-strong" fill="#581C87">v3.0 distributed-inference branch (purple, dashed):</text>
  <text x="60" y="726" class="step-text">Per-request decide() inserts an offload step between handler and backend. The consumer's streaming response shape is unchanged whether the inference ran locally or on a peer device.</text>
</svg>
